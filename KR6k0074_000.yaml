front:
  text: 佛說目連五百問經略解序原夫此經二卷律宗該攝文辭昭著義趣幽深乃初心入道之樞機末運修行之關鍵也第失譯人之名目有疑非佛之親宣噫若非采菽氏之大權示現五百請何易咨詢自弗釋迦文之至聖深慈半千酬恐難報答矧乎經中言言盡明學處句句咸暢毗尼必也聖賢之所自斷非常人之所能奚惑之有哉當知此正如來異妙方便助發實相義者寧不思之乎倘固疑而不信者謗法之尤恐難追逭也願吾儕深信深入慎勿憚其名相多端忽而不學定宜熟覽斯文謹潔身心依而奉行者庶不失於戒體抑且嚴護威儀因戒生定因定發慧三學圓明無上菩提必亦由茲而成就也然而文雖顯著恐蒙學初心猶未諳其旨趣近有幾家疏注文雖頗足而亦未盡其詳故吾不得已而重箋釋之目為略解以便後昆用廣流傳無遏絶焉是為序崇禎七年仲春中浣菩薩誕日刀果道人性祇謹識佛說目連問戒律中五百輕重事經略解目次卷上自序五篇事品第一問佛事品第二問法事品第三結界法品第四問歲坐事品第五度人事品第六問受戒事品第七受施事品第八疾病事品第九死亡事品第十卷下三衣事品第十一鉢事品第十二雜事品第十三三自皈事品第十四問五戒事品第十五十戒事品第十六問沙彌品第十七歲坐竟懺悔文此九十日中所犯事通威儀佛說目連問戒律中五百輕重事經略解目次終
