body:
  text: 失譯人名附東晉錄明姑蘇報國寺弘戒沙門性祇述三衣事品第十一三衣者五條七條二十五條表除貪嗔癡之三毒乃受戒比丘必用之要物非世俗之所有也其間種種功德詳明戒本薩婆多毗婆沙問云不除鬚髮得戒不答曰得戒但非威儀必當剃除鬚髮披著袈裟圓頂方袍名為釋子比丘故有三衣之事此品有十一問答浣衣宜捨問第一問若比丘三衣事三衣有汙應當洗浣要須捨轉施與人不答須捨與人若不捨犯捨墮當施與人浣竟待人還乃得更受夫浣衣宜須細行不可手搊足蹋亦不可以口含噴水敬衣如佛戰兢勿怠捨受羯磨等文具如律中或不及羯磨隨便志誡問訊於可托者直言捨受亦得三衣條成問第二問三衣盡得條相而成不答大衣得中衣小衣不得梵語僧伽梨此云襍碎衣四長一短割截衣持即大衣也此有九品詳明戒文梵語多羅僧此云七條衣兩長一短割截衣持梵語安陀會此云五條衣一長一短割截衣持大衣但許四日而成七衣二日五衣一日過限得罪惟有大衣二十五條相所成故云得中下但有複數故云不得五衣上講問第三問比丘小衣得著燒香上講不答無中衣得下開若不近身體淨潔者隨意亦得五衣本作務飲漱等用燒香等宜著七衣或無權代亦得有即亂制不得當知五衣貼身所著多有垢膩故淨者不制衣用米粘問第四問比丘浣衣出帛以淨去原漿可得用米粘漿粉之類不答不得用者犯捨墮隨浣隨著無犯下開日日從沙彌白衣受或用粘亦乃得著不得自用者或恐失威儀故未可知也但依佛制不必曲解衣可施裏問第五問比丘三衣應施裏不答裏施不施亦得律中大衣有六層既耳七衣五衣或有一二隨時寒暖或圖著無可不可故云亦得大衣上講問第六問比丘大衣得著上講禮拜不答無中衣得講禮當著七衣大衣乃陞座乞食等時而著今隨缺略亦是權開不然亦不可亂其規制故違亦恐得罪慎之生絹作衣問第七問比丘三衣得用生絹作不答一切生絹衣不見身者得著戒本云三衣應以粗疎苧為其體獸毛蚕口害物傷慈縱得已成斬壞塗埵此用生絹言得者當知如來方便隨機此經必在小乘教中不了義說暫時而許必非常法戒本乃是通常統括大乘而言故為絕制權實隨時故爾思之可見嗔壞鉢杖問第八問若比丘瞋忿自壞衣鉢錫杖犯何事答瞋惱自壞三衣鉢犯捨墮壞錫杖犯捨墮壞他物許錢犯事計錢多少犯罪輕重嗚呼既稱比丘以忍為先當識自心勿令嗔起衣鉢乃忍辱之法器錫杖表如來之法身損壞可乎如來雖大慈悲汝自傷乎法性故得此罪泥梨苦報日久時長惡性比丘宜當速反借衣出界問第九問比丘三衣得借人不答不得出界經宿若同界內得不限日數律中不許離衣一宿況出界外乎遠隔二丈五尺就是離衣界內得者或不得已暫借一者亦不限日數若總借者斷乎不可准律無昧大衣聚落問第十問比丘入聚落中不被大衣犯何事答著肩上去不犯佛制乞食當披大衣故入聚落披者為是或不及披肩之無過若僧使出為三寶事或為病人等持去不犯但囊之而去不肩不披俱不犯戒此為有事比丘之所開非為具威儀者之所說亦自思之補衣施受問第十一問比丘三衣破應補便得受須復施他人耶答破容猫子脚許便應施人人還乃得自補而受若先補後施人人還亦得此單為小破急須補治莫容穿漏失儀捨受隨宜皆得上三衣事品竟下鉢事品鉢事品第十二梵語鉢多羅此云應量器體色量三皆如法故體則用鉄瓦二物餘非佛制俱不宜用色則用子杏仁搗碎塗其內外竹烟熏治薰作鴆合色孔雀色等量則斗半七升等者亦非今時僧用今者但可二三升即得應其量故受戒之人必用此者以表威儀使人生信故毗婆沙論云若無衣鉢得受戒不答言得戒問曰若無衣鉢必得受戒何故必須衣鉢答曰一為威儀故二為生前人信敬篤心故如獵師著袈裟鹿以著法服則無怖心故三以表略相故內德既異外相亦異生信心者信三寶生人天中信邪見者墮三惡道是故衣鉢心不可缺也所以三衣品後繼於此品事如下文有八問答失鉢所由問第一問比丘鉢云何失答若緣缺或鉢口有缺若穿穴或中間一孔若裂些些路裂若油六群不知曬鉢出油故不捨盡是失緣缺穿穴不可復持裂者綴己施人人還更受油不捨亦爾應云洗而熏過施人人還更受故云亦爾若棄出界經宿不失此云油者裂者使人熏綴故經宿不失多日不宜鉢是日用不可缺故今受戒人受後即以衣鉢束之高閣者思之鉢覆於壁問第二問比丘鉢得合覆著壁上不答若巾裹得合淨處著若囊或懸壁好不得覆著壁上下引證昔六群比丘覆鉢壁上墮地即破佛因此制戒自今已後不得覆鉢壁上覆鉢壁上者犯捨捨字應念墮字墮地者犯捨墮覆壁犯墮墮地破鉢故犯捨墮次第輕重理之必然要知好物不安於險處恣肆不謹者戒之不用有過問第三問比丘早起得用鉢食如好簡略不用有何咎耶答一切食大食小食皆應用鉢若一日都不用鉢犯墮意含但用日中一時可也佛尚日用不離衣鉢乃至雲門德山永明等諸大老歷代明流俱無暫離今之比丘毋得懈怠因循而忽之自招其過也或有事緣無故意失用者聽以淨水洗過無犯微細威儀問第四問若比丘食飯欲盡得側鉢括取飯不答得比丘持鉢當宜平正食盡側括恐失威儀故問佛言不妨故云得律中但不得作聲令餓鬼咽中火起慎之猶當細行持鉢可離問第五問若比丘一切皆應用鉢俱不可離食後已訖更噉餘果手得離鉢不答得下開若食未訖亦得暫離況食已訖乎非都不用故云得一切但指飲食非果品故持鉢可放問第六問比丘食鉢要當擎得放地不答要當擎或擎或放有失威儀故然而或不得已若放地亦不犯戒意含畢竟不放為是放雖不犯恐不雅觀故云亦不言放地者西域規矩食恒坐地故鉢器互用問第七問若比丘以器或鏡碗等器盛飯貯著鉢中得互用鉢食不答不得犯捨墮此是懈怠比丘或憚寒冷或懶滌鉢故爾習久成風遂失正軌故犯捨墮其過非小必當慎之可也鉢作炊鍋問第八問比丘鉢得炊作食不答不得比丘乞食不自熟食炊犯捨墮洗鉢尚宜溫水滾湯恐去鉢光即染垢𧸐況炊者乎混亂胡為有違規制故犯捨墮上鉢事品竟下雜事品雜事品第十三雜者種種差別不同之謂也事者即下劫盜楗槌等事上文佛法歲坐等事各有多種自成一品下文事相雖多不成一類故以雜事一品而總收之有一百零七問答界外取物問第一問若比丘或被劫盜物所盜之物未出界主比丘見本物不知諸物眾物不一認之不真得取不答得取不使失故然而即取即用九十事中實相似者有二意當先作念若有人認者即當與之不得取若無人認者白過大眾方始得取無眾何如若無眾作界內物取取而公用不以為己取物私為一己犯罪九等相似者意同事別此是劫盜所遺之物彼是僧伽藍及寄宿處物故詳明四分略註可知楗槌限外問第二問眾僧打楗槌食而限外僧來不與食犯何事限外即界外答便是失利得突吉羅即打楗槌即為十方悋而不與名公意私令人譏謗自他失利故得罪如或無愧無耻之流恒來纏繞者但間而稀之可也若全不與者亦猶不得他齋餘受問第三問先比丘教化作百人齋定數之後成增長一人以上或二三人應受不教化比丘有犯不答打楗槌食多亦應受教化者無犯所以爾者何也打楗槌者謂恐四方僧多少經過者有所遺失而不知故也楗槌法要作意請四方僧故僧來若多若少一切分財飲食其於無咎薩婆多云若有檀越請四人以上應打楗槌若不打楗槌設知此中乃至有一比丘下來食者得別眾食罪若疑有比丘來而便食者突吉羅罪若都無疑心若打楗槌不問有無一切無罪縱不打楗槌偶增一二亦不可局而令人懷慚而去也戒之僧食與外問第四問若比丘教化白衣錢粮供養眾僧若有外人來乞索教化主得與一升五升不答不得若不知法與者其罪猶輕若知非法故與者過五錢犯棄若必不可免者當白眾若白眾聽得此物即眾所有故所以眾聽與者無罪化主專權私廢眾物者慎諸減供餘用問第五問或有主人供養諸僧長請不限一年二年恒長之請一日百錢用五十自供餘殘者得餘用不答須打楗槌得供四方僧無私取之咎故若自無衣鉢不打楗槌眾中和合得減用意含不知亦不得有僧還屬眾故若自損施客僧最善自者自己分中則可他分中者猶須和合可也若一總為眾待客無論貪好多費問第六問若有主人請比丘十日供十日食殘應裁字裁用作五三日好食用犯何事答不犯施心已盡故但不得更索索犯捨墮縱貪心故若不滿十日乃至第九日去亦犯捨墮縮長為短貪饕無厭退息信施損己福德所以防心離過當自察之知足減用問第七問主人請供十日食自裁作一月食得不以上相反可知答打楗槌得滅供四方僧有福無過若不打楗槌僧有出去者當以前僧之所餘施過於後人始得無罪若不施與後人食後人食似乎己分之所有不知盡食他分所以一飽犯棄不飽犯捨墮前者所餘是四方僧物故上者貪好無慚而犯罪此中惜福不知法度亦招𠍴令他犯戒故微細因果惟佛能知為出世者觀此聖教可不謹乎乞贈父兄問第八問若比丘有父母兄弟破壞或被人哄賣乃至流落於人家故云破壞得乞物贖不答得但不得稱己但乞時不得稱言為己必須言乞為父母兄弟得比丘當誠實語不妄語故下遮止己私若用訖有長不得自入還屬所贖者父母等用不得已用何也若語父兄父兄聽用猶犯墮父兄不聽用而用犯棄不聽強用同於盜故言行不直聽與不聽皆失前來好心故為人作福者當自嚴之酤家乞坐問第九問若比丘至酤酒家得乞財不無事得坐語不酤家乃十六惡律儀之一也答酤酒門或乞財坐語等一切不得入若入犯墮更有餘門非酤肆之正門得入下開若請比丘會或作齋會佛事等當問酤家主人能受一日戒不主者若言能既能即與受一日五戒得住若不能受但能一日不酤酒一戒亦得住比丘亦不犯戒若一總不允此人難度必不可住酤者如此屠家亦爾此亦惡律儀例同可知此有二益一者比丘不混於惡律儀二者能勸此等受一日戒功德無量故惡律儀十六即是屠兒魁膾畜養婬家等詳明教乘勸令破戒問第十問若比丘勸他人飲酒犯何事答強勸此人心堅不飲勸者犯突吉羅若飲勸者犯墮貪飲之人墮於沸屎洋銅地獄又經云以空手過酒器與人飲酒者五百世無手何況自飲教人飲者乎若能勸得一人除葷戒酒乃至三皈五戒能勸所勸俱得無窮福利當自勤之為上寄物與餘問第十一問若道人寄白衣物即白衣物寄與比丘此人即白衣人過期不來過其所約將此物與餘比丘餘比丘得取不答不得取何以不得若活是有主物若死是四方僧物若取與者受者皆應犯重有主僧物夜行把火問第十二問若比丘暮得捉火行不即令筏繵火把之類答曰冬得無蟲蟻故夏燃燭燈籠之類亦得不傷生故若把火炬犯墮大傷飛蟲故古有因蛾不點燈為鼠留殘飯先聖護生心切如此如或放逸不謹者依經犯墮寧不慎乎貿易貪利問第十三問若比丘有本物隨有一物直一疋疋等也一等價因偶行至他方貴賤不等之處賣得五三匹一倍五三等倍可取不答不得犯捨墮隨方貴賤理本無咎但在世俗可得出世道人常應捨施豈得貪利營求增長過惡故犯此罪負物不償問第十四問若比丘一切戲負他物不償犯何事戲弄不實之事亦有過不答戲取物及戲與盡犯捨墮雖似無心皆不出於貪慢好戲調弄失真實行故俱得罪比丘甞食問第十五問若比丘甞食得食不甞字似非口甞之甞乃經手造食之謂也下文可見答不得有何過耶知而食犯捨墮前嘗食人此正造食之人比丘不得手自造食故亦犯墮若不即懺其罪日增若急懺求城則可向下引證昔有一執事比丘恒知處分當作飲食作典執之類常手拄器言取是用是日日常爾不懺因不懺故其罪日增命終後墮餓鬼中有一比丘無著於夜上廁聞呻喚聲無著問曰汝是誰鬼即答言我是餓鬼無著又問云本作何行墮餓鬼中鬼答云於此寺中為僧執事著又問曰汝本精進何由墮餓鬼中鬼又答云不淨食與眾僧威儀不謹或手不淨故云爾無著又問云何不淨鬼又答曰眾僧有種種瓮器器盛食見見應云我以指拄器教取是用是物犯墮理應即懺三說誠不悔轉至重或三諫或經三月說戒一總不懺故轉重以是故墮餓鬼中下明其苦狀兩手擘胸擘即裂也裂皮破肉搏喉吹𠹀搏者擊也撮也𠹀者濆噀之狀無著問何以擘胸鬼答曰蟲噉身痛故著又問何以搏喉吹𠹀以口中蟲故復問何以呻喚鬼答餓極欲死故著又問欲食何物鬼答意欲食糞而不能得著又問何故不得鬼答以諸餓鬼推排不能前故不能得無著言我知奈何鬼言也可易得願眾僧見為呪願我即得糞也無著答曰可爾便得無著即還向眾中說彼執事人墮餓鬼中事眾僧問其故某比丘本行精進不怠何墮惡趣下無著述其所以答眾曰本以不淨食與僧而不悔必以前事一總述答可知故願與呪願便得食糞不復呻喚吹𠹀等也下結上文以是證故當知大比丘不得手自造飲食及拄觸僧器物即鉢盂可知若非僧器或盤碗之類手受得行與僧無犯所以前文甞字應作經甞造作之義為是故知大比丘甞以禪觀留心欲作福事可令初心行人營造縱欲自造心須謹潔嚴淨始得不然此處可鑒要說未供先甞之義亦宜慎之可也非法可遠問第十六問若師令弟子販賣或一切經營作諸非法不如法等事得遠離師不答得捨去四分律云種種販賣犯捨墮自作尚爾況令他作故當捨去下廣明去住有四因緣應住何等為四一者與法與食不與衣鉢應住既有法食身心皆益故二者與法與衣鉢不與食應乞食而住三者與法衣鉢與食事事俱全感德不勝應盡形依住四者與法不與衣鉢不與食亦應甘淡薄乞食而住雖不及於色身亦能養我慧命故若師都不與法不與衣鉢食應去若但無法亦尚不宜依止若也俱無全無所益空喪天年故不應住況令販賣者乎何物當淨問第十七問若夫淨物何者須淨淨有幾事答果菜須刀手火淨刀或去皮殻手可以去根葉火可變生為熟俱可言淨唯穀米須火淨此正變生為熟比丘不宜啖生氣等故果已淨子無苦果有去子亦有去皮亦有變生為熟者略去可知淨潔也用此等法名為潔淨佛以慈悲令造食者知宜而不宜當須調適資色身而長慧命全憑飲食而助成一有不宜恐有妨礙故制皮革禮拜問第十八問比丘禮拜三寶得著短靴鞋履皮革不答淨者得意含不淨者不得犯惡作罪然而前者登壇受戒之際故言有犯此或尋常禮拜故言得也變易幡花問第十九問比丘畵作幡華賣得物犯何事答犯捨墮以貪心故畵幡供養三寶始得如賣同前販賣客作故犯此罪教他貿易問第二十問若比丘教令他人販賣邪業活命犯何事答犯捨墮他人者或僧或俗必有貪利心生故亦犯捨墮畜養牲問第二十一問若比丘畜奴牛驢馬犯何事答犯捨墮不悔轉增蓋夫一切眾生皆有本來佛性與我無異畜而驢使便見類殊彼我心生慈忍安在分外貪圖非佛弟子故得此罪知懺可釋不悔增重不可不慎未度僧食問第二十二問若比丘教授令人出家為道或未剃度未入僧數得食僧食不答白僧羯磨得不白犯墮比丘所有即大眾所有如不白眾私為一人故得此罪應白眾云大德僧聽我某甲求眾僧乞度人受戒願僧聽我度人受戒慈愍故三說詳明律中不引僧食已用問第二十三問若比丘為僧乞食於道路己身得食所犯之食不答若去時先白過僧僧聽好無過若去時不白還來白眾聽亦好眾若不聽還將己物而償之若不償犯重私食眾食亦同盜僧物故當知因果甚為細密分毫不爽為眾化人路食尚爾況有減剋徇私等者重之甚重慎諸寄物經宿問第二十四問若他人或僧或俗持食具或碗鉢等具寄於比丘屋中經宿此比丘有犯不准律比丘不許用殘宿食故問答不犯不犯者他人所寄於己無干以自不犯殘宿食故所以無過也油置己房問第二十五問若比丘以續明油佛前燈油一升二升此是佛物宜安佛地或恐有失得著自房中不答得若不悞用收自房中無過若別用者亦應計錢犯罪藥酒存房問第二十六問若比丘以藥酒得著自房中不答病得七日過則犯戒恐有貪心故藥酒如醫者言非酒不療必當用此和藥而服不見酒氣者可也故病得七日非病一滴不得故用准律中服時不許入眾七日後應在佛殿下風遙禮七日方許更衣入眾葷等亦爾不嚼楊枝問第二十七問若比丘都不用楊枝有犯不答犯捨墮律中楊枝有五利益一口不苦二口不臭三除風四除熱五除痰癊兼明目等不者反上所以都不用非但失利抑且犯罪又名染污人不許禮佛及和尚等亦當勤之勿怠未曉楊枝問第二十八問比丘晨嚼齒木未曉得用楊枝不答明星出後得用明星即曉星此星出明相生一切可用不犯非時戒故中後楊枝問第二十九問比丘中食後口得用楊枝不答得用若不或無楊枝用純灰皂莢汁漱口亦可若都不用犯墮過中午後用犯非時戒亦犯墮下開遮中後服藥不論除藥之外一切艸木有形之味不得入口入者犯捨墮教中諸天早食佛日中食午後非時以違佛制故犯此罪餘木可用問第三十問比丘若無楊枝處所口得用一切餘木不答盡得但能除垢類皆可用故楊枝偈呪具在毗尼日用憎貧市乞問第三十一問比丘貧乏得入市乞不答中前得中後過午不得亦不得乞錢比丘不接銀錢故若必欲乞錢而用當將一白衣令代𠬧之作淨而用可得沙彌亦不得亦不詳手捉銀錢故此但制其多貪若不多貪暫捉作淨可得被賣可走問第三十二問若人捉比丘賣此比丘得走脫不答初時未賣得走無過經主不得走有主物故雖是自身他人得物應代償故不者似犯盜故不得戲物請僧問第三十三問若比丘戲即戱法等事得物得作食請比丘所請比丘得食不答不得食食者犯捨墮此等邪外癡流理應責治擯出除其惡見以正清規若受其食即同不淨活命故得此罪也尼惰勸休問第三十四問若比丘尼不精進或有怠惰心生比丘可勸他罷道不答無此理比丘應教授尼眾云精勤行道謹慎莫放逸如斯誠誨者可也豈反令其捨淨業趨染業乎得罪彌重故無此理施藥悞傷問第三十五問若比丘合藥施人而作看病福田然而不知裁節用藥不當反令服者身死犯何事答若好心與雖死無犯但不犯重亦恐犯輕心不謹故惡心與犯重不解行醫或貪利惡心悞傷其命故犯重好心看病者亦當於此自勉多臘不誦問第三十六問若比丘或十臘五臘竟不誦戒犯何事答若不誦戒食人信施日日犯盜誦戒之法千佛恒規生善滅惡增進道業故違不誦得波羅夷罪亦是佛海邊人以無戒德不能消其信施故所以應當半月半月誦戒蓋形不廢得無有過也下開若先不知後知猶得懺悔盜罪懺悔即安樂不懺悔罪亦深不可不知也寄宿神祠問第三十七問一切鬼神屋即社廟神祠之所比丘可寄宿不答在路途中必無可宿之處得宿然而亦須肅恭誠敬若有觸擾意住犯墮雖佛弟子若起故觸之心反使鬼神不喜故得此罪慎毋自稱高尚而不敬之也比丘生噉問第三十八問若比丘噉生肉犯何事答犯墮言肉者世尊為初心者許食五淨肉不見為我殺不聞為我殺不疑為我殺乃至自死鳥殘然而不得生噉傷胃妨道故犯墮大乘絕制不可不知男媟不竟問第三十九問若二男行欲或彼此行不淨行不竟犯何事答犯決斷竟即犯重可知二男擬戲問第四十問若二男欲口戲嗚口之事擬便止將欲未及便止犯何事答犯墮成者犯決斷有欲心故兩問皆云二男誠難消會若言童子既非比丘五篇誰結若言是僧何曰二男若言一僧一俗文亦不順畢竟何如據愚言二男者當知或有年少比丘染習難忘好為戲事故有此制譯者隱誨故稱二男智者詳之汙席可住問第四十一問若比丘牀席臥具或有他人於上行欲即不清淨其行欲處可住不答若見其處淨洗可住若總不見不洗無礙不作想故僧跋可食問第四十二問若比丘以唱僧䟦竟上座未食下座先食犯何事答聞唱便食不犯僧䟦已竟一總蓋應食故影略未唱先食者有犯僧䟦者即時常佛制比丘食存五觀等可知六物不具問第四十三問若比丘不具六物三衣瓶鉢漉水囊犯何事答此乃道具若無應乞若不乞作違教失儀犯捨墮日用不可缺故若乞一時無緣不能得不犯佛亦教人乞化者勸人修福彼此兩利功德無邊故也通衣睡眠問第四十四問若比丘大寒嚴冬之際得彼此通共一衣一被而臥不答著衣得彼此著衣無異念起故得如天暖不得犯越法罪通字有二義若作二人看如上所解若作一人看即是通身著衣而臥亦得何以故西域但有三衣無別衣被故寒天不著恐防風損故云著衣得存之二解使後無疑也自貴自強問第四十五問若比丘自稱貴姓剎利等姓及持戒強力堅持禁戒勇猛精進如是自衿乞得犯何事答犯捨墮此乃憍倨矜憐妄自尊大貪婪乞求故此得罪按摩腫病問第四十六問若比丘之姉妹或有癕腫等病或有疼通之處比丘以手按摩此處可治犯何事雖是同胞僧俗有別若預其事有罪否答若起心犯決斷欲愛不除故不起犯捨墮男女授受不親世俗尚爾況比丘乎所以動心不動心盡皆犯罪失禮被譏有傷僧體故方術傳嗣問第四十七問若姉妹無兒息語比丘言教我方術無嗣為憂或求其種子等方比丘即教犯何事答犯決斷若教此法即非正智有後無後宿定難期不令修於正智清淨法門而反教之於染汙之事俗氣不除故得此罪受寄不還問第四十八問若人寄比丘物令轉與他人比丘私匿竟不與他人受寄比丘犯何事答自取不過與人犯重暗昧欺心亦同盜取故乃至擬心動念欲取不取者亦犯偷蘭遮等廣如律中又一解亦可說人寄物與比丘後寄者來取應與還之龍不與亦得此罪文字活潑當存二意可也著故壞還計直多少犯罪輕重聚落離衣問第四十九問比丘聚落中都不著衣犯何事答犯捨墮律中入聚落或乞食等俱應著衣如不著衣名為外道不取俗敬故違佛制得罪事難啼哭問第五十問若比丘啼啼者泣也犯何事或為出家事難乃至失喪等啼哭有過否答若聚落眾中一作犯捨墮一啼一捨墮再啼再犯或習氣不能一持頓除遇諫即止無過若三諫不休犯決斷惡性不受人語故夫為法忘軀萬緣放下始名學道之人不然心志懦弱失正熏修違慢佛語故得此罪持看兵戈問第五十一問若比丘行聚落中或過兵戈之處持弓刀看犯何事答若先不知律法看者無犯若知看有過故看犯突吉羅罪律中比丘尚不得為持弓刀者說法況持看乎有失威儀故犯乘騎行道問第五十二問若比丘騎乘或驢馬等犯何事答雄者一住犯比丘尚不得為乘騎者說法況自乘乎據理應犯捨墮遇諫即止無過若過三諫不止犯決斷違佛語故雌者一載犯決斷畜生女想染污念起故犯此罪又況人畜雖殊同一佛性故俱得罪律中或老病者一總不論以無異念故看人鬬爭問第五十三問若聚落中比丘看白衣鬬犯何事答犯捨墮白衣爭鬬生死相關俗尚不宜況僧者乎律中比丘行道左右顧視尚失威儀況看鬬乎逐境漂流故得此罪暫時奕戲問第五十四問若比丘暫捉碁子五木而戲犯何事答犯墮碁子即圍棊也五木梵語波羅塞戲即象棊隊伍之木也乃至彈棊六博擲賽等事此乃世俗戲伎非釋子所為亂心妨道故得此罪暫捉尚爾多作更重可知戲弄小兒問第五十五問比丘於聚落中與三歲小兒抱嗚口作哇哇淫愛之聲犯何事答犯墮若欲心起猶宜決斷略之可知此等情愛不除失儀壞正故制白衣相撲問第五十六問若比丘於聚落中合白衣相撲犯何事答犯突吉羅與白衣相𠬧相撲交拳鬪勇此乃掉舉習氣難忘招突惹禍妨修正行故犯惡作看人合畜問第五十七問若比丘於聚落中看白衣合畜生或牛馬等犯何事答知非法故看犯捨墮此乃世俗畜養營業求利等事庸觀尚為醜態況比丘乎速當遠離回作不淨觀想止息妄心無過否則得罪故云知非等不知非法不犯雖見而無心故若內起淫心口有染污言犯麤惡決斷有一即犯況心與口之二者乎故犯此罪乞食矚餘問第五十八問若比丘食不足得囑未具戒者不答得唯除婆羅門比丘結午或食量不同或遲速有別故有足不足等或沙彌五戒等人皆稱未具戒者囑令補足可也此婆羅門或外道等我慢貢高及不敬三寶見僧反生譏謗故當除之取無主物問第五十九問若比丘在山中曠野中見一無主器無主物可取用不此處無主不同前北洲之例故下云云答得用要須語王治國之主是彼所有故須語之若王家之人官屬之類若語餘人得用餘人當處所見之人明有所證非不與取故如餘留本處不得持去若持去犯捨墮比丘貪圓無厭有妨正行故犯此罪作醫取物問第六十問若道人或作醫得取物不醫療也與人療治疾病答若慈心持得作持即取義作即作醫之意以慈心故作醫取物俱得惡心不得惡心即貪心也用藥治病作福田想不得取物即是不淨活命故然或病者痊愈感德心酧當以慈悲受之代為作福得取若以貪心而取不得據下文亦應捨墮下開遮若無衣鉢前人與以禮作謝得取作衣鉢用若有衣鉢亦不得取比丘不接銀錢故或前人強與為福事得取作福為妙若人不與比丘亦不得說為他作福乞乞者犯捨墮亦是貪惡之心亦同不淨活命故前人若人俱指病者等人說食巾墮羮問等六十一問比丘食巾食時護衣之巾或少多醬菜飯羮墮于巾上要須洗浣不答非但少污不污亦須日逐洗浣若有沙彌白衣付之與他日從彼受或不浣也不犯若已付著室中無苦無過也若不付與沙彌等人有所污墮又不洗浣皆違佛制犯捨墮食巾護衣比丘當用此乃古規不浣猶且犯戒況不用乎慎之開門小出問第六十二問若比丘私己房室非眾僧房小小事緣出房不閉戶有犯不答犯捨墮恐有所失罪皈無所故必須謹慎防其未然無非是道如或放逸自謂直道無心不知逆境難迯反失於正故犯此罪私房拍手問第六十三問若比丘私房內拍手笑犯何事答犯捨墮楞嚴云晨朝以手摩頭剃髮染衣所為何事善攝身心尚未與道相應拍手大笑縱在私房失儀怠情故犯此罪跳躑溝坑問第六十四問比丘得躑過小水小坑不答不得犯墮比丘行道當如雁行庠序嚴整威儀尚不得搖身掉臂左右顧視豈得躑水跳坑失儀損德令人議毀故制下引證昔有一優婆塞請一比丘欲與作一領好衣比丘因請即隨之而去中道之間有一小水坑闕比丘便躑度此優婆塞便嫌心念言我謂是好比丘欲與他一領好衣比丘應得威儀整肅而更跳躑溝坑豈是好比丘耶即退息念云我歸當與半領衣罷此所請者是無著比丘具他心道眼者知其人念前行見水復故躑過賢者復念又退息云我歸當與一張麤㲲前行見水復故躑過賢者復念展轉不合其意云我歸當與一頓食罷因請之不得已故而作此念無著復知其念前行見水便舉衣涉渡過去也賢者問比丘前二三次躑渡今此何以不躑渡耶比丘答言卿前與我一領衣已一躑過水正得半領復一躑正得一張麤㲲復一躑正得一頓食我今所不躑者何也恐復失食必當忍飢而去也賢者乃知是得道人便向懺悔將歸大供養下結前以此騐之當知比丘不得躑過坑水行非無著必當嚴重細行慎勿粗疎狂躍不能令人深敬反生譏誚使彼有過故制無事急走問第六十五問若比丘走犯何事緩步曰行急奔曰走此亦承跳坑而問可知答犯墮有急難等事走亦不犯無急事畢竟不宜何也行須緩步馬勝威儀讀書君子猶尚從容學佛之流豈宜暴卒碌碌忙忙誡為不雅故制僧取俗物問第六十六問若有人即比丘也出家之後還來盜本家物犯何事本家即俗家也答犯棄所以爾者何也初出家時縱有財物一切盡捨俱屬於他非己物故所以犯棄出家割愛親亦非親作施主想若有所須化之無犯還取藏物問第六十七問若比丘本在俗時共父母兄弟藏物或金銀財寶埋于地等處出家後俗家之人盡死比丘還自來家取此物犯何事答若自取犯棄同上非己物故若有所觀白衣可與說過便取作福然而應分一半與官所以爾者何也此物無主應屬官故不得全取全取亦犯重若多若少值五錢即犯棄罪何以故汝既出家一切盡捨取則同於盜故更戒大小問第六十八問若比丘師更受戒小弟子師或犯戒還俗等緣復來悔過受戒故弟子戒反大弟子得作下臘下戒及在下行不又問若必不得下臘下戒可得為其作禮不答都無此理然而初難是師捨戒更受戒反在後故無此理當知只論戒之大小不論始初軌則若依戒之尊𢍉師當反禮弟子以戒為尊故擬徑田行問第六十九問若比丘行他田地中行道貪徑故或種植有苗或無苗有事不比丘行路不蹋生草是名持戒如或縱恣亂行有犯戒耶答有苗無故而走犯墮急事不犯無苗盡得苗是農家治生之本人世資粮行必有傷故得此罪或有急難等事有所追逐而走無過無苗無損隨意蓋得無犯發露決罪問第七十問大悔人已發露或但五三日或有事難眾僧分散罪得決不若比丘或犯僧殘當求二十僧中懺悔應行波利婆沙等行以滿七日方得罪決如或未滿罪可得出否答云未也更求眾乃決直待日滿更求二十清眾懺悔乃可得出少一人少一日猶不可也如律所明毋忽賣卜受供問第七十一問若有王者一國之主來問比丘吉凶消長等事比丘為王說其所以然復受他供養犯何事答若得食犯墮得衣犯捨墮不遵佛教犯貪慢心教得此罪然猶平常不急等事若說征伐兩國相爭勝敗之事得供養者犯重若夫比丘求安樂行不得親近國王大臣阿蘭若處精苦修持以為其本經中一切卜筮悉皆犯罪何況為說征伐等事哉為利教殺不淨活命故犯重罪俗由行道問第七十二問若比丘有緣事俗田行不答得應云無緣也不得此與上無苗盡得者同急事緣事略異可知不隨依止問第七十三問若比丘未滿五臘不依止犯何事初受戒者要當五年依止以為定量有智聽許離師知五事等方可為人軌範不知佛亦不許應學即得無智猶須蓋壽不得離於依止故問答不依止師若飲水食飯日日犯盜不知律法無德可消故若先不知有依止之法後知猶得懺悔其罪即滅懺後還當依止此顯如知法者故違懺亦不得也嗚呼今之受戒者非但不能依止和尚闍黎一受之後束之高閣者多矣良可嘆也然或受戒者眾安居處少必無所依者應須熟覽此經并諸律韶潛心習學依教行持庶幾可爾不然犯盜之罪佛聖明言恐難迯避也慎之十臘不誦問第七十四問若比丘或十臘不誦戒答同上依止此重出不須更解市易譽己問第七十五問若比丘市賣自讚譽己物過越常價值一說二三等前人俓信之人信其真實而貴買之此比丘犯何事答犯盜比丘元無市賣之理妄語貪圖名為口盜若遇五錢即犯棄罪此乃不持弓刀之寇佛法中之大賊見不可也無人受食問第七十六問若比丘行逈路有食逈遠路途絕無烟火之處偶爾飢乏之間或遇有梨棗瓜菓等食無人授受云何得食律制受食須有證人明非盜取故答正得舒一手下向一捉食便止過犯捨墮無人之處但可作無主物𥄑只宜一捉當生慚愧呪顧食之無過或過二三即犯貪心故得此罪雖不及飽必須守戒慎之船行便利問第七十七問若比丘船行水奔不得下得水中便利不答得上下恐有失緣或妨於眾故可隨宜亦不犯戒然而亦須細行詳明律部可知竹木書經問第七十八問若比丘書經竹木上誦訖拭去犯事不答犯捨墮經既有本宜須尊重受學書竹木而拭去者此乃輕視佛法故犯此罪若書經呪於城屋墻壁等處令人受持者得福無量可知臘滿誦律問第七十九問比丘未滿五臘得並入誦律不答不得為可粗教誡而已五臘未滿猶宜待時若欲并入臘長眾中半月半月而誦戒律者不得但宜粗淺略示教誡而已誦得何罪若誦犯捨墮以時未至縱知五事亦得此罪又問大戒雖是比丘不滅沙彌戒更行沙彌小戒者故是沙彌非沙彌耶答非白四羯磨已竟即入大比丘位故宜當自重如或好簡怠惰亦必得罪可知貪眠犯事問第八十問若比丘晝眠犯何事答開戶不得如眠犯墮影顯閉戶亦得何以故或禪坐力疲暫欲晝眠調和四大閉門無過開戶不得者一者失儀疎曠二恐初心効由有所不宜故犯此罪倚伏失儀問第八十一問若比丘得倚壁伏地不答私房得或亦禪坐之間昏沉太重等事必欲以此排遣調停故云得雖在私房不失正念則可不然另有調和法門詳具教中不可不知眾中不得如為犯墮眾中失儀取笑識者故得此罪三衣應着問第八十二問若比丘舍內都不著三衣犯何事律中受食作務著五衣禮誦禪思著七衣升座乞食應著大衣故問答坐禪誦經不著犯墮若據南山四儀三衣不得離體豈但舍內乎今之禪者開口便言坐禪在心著衣何為不知內修禪觀外飾形儀表裏一如方名正智如或執理廢事名為偏見外道故犯捨墮戒之裏衣繫脚問第八十三問若比丘行道著泥洹僧又云涅槃僧即下著裙得繫脚不連裙繫之於脚或更穿鞋襪西域露頂赤脚為是此似為東土者故問答大寒得不寒不得恐失彼國之儀故惟東土則不然寒暑盡行衣物莊嚴始得雅觀可見彼此風俗不同故作此說漆器可用問第八十四問若比丘畜漆器犯何事漆鉢斷然不可畜一應漆器有過不答漆木器蓋不得用如用犯墮漆乃以刀割樹而取亦有傷殘缺於慈忍比丘不蹋生草況斫樹乎情與無情共一体故故犯此罪今之叢林似乎必不能已者應須懺悔減省可也不然故違佛教斷乎不可污手受食問第八十五問若比丘已食之淨手或搪造飲食汙手或和麵索粉等沾污於手更得受食不答得律云不得汙手捉食應當學此已食之手原淨因造食污非為不淨故言得餘俱不得可知上房輙坐問第八十六問若比丘至上房中不應坐輙坐犯何事答犯墮上房即上座尊宿之房或有聖像在上稱上房或云樓上之房若有佛在下此處不得擅坐坐即犯墮上坐具十德以德重故初追晚學猶宜謙謹如不命坐而輙坐者得罪十德者有住處無畏無煩惱有知識辨才等詳如十誦律中同尼繞塔問第八十七問比丘不得與婦人前後互隨行若比丘旋塔或比丘尼優婆夷隨後從有犯不塔或舍利牙髮等塔上供佛像在中若能右旋敬順佛意功德無量四眾人等蓋應遶之然而比丘欲遠必須男眾隨之故作此問答若有優婆塞不犯梵語優婆塞此云近事男即男眾也有此隨之更有異眾蓋不犯戒不然被世譏謙故當慎之遶塔倡呪具在日用根可食問第八十八問若比丘生菜已淨有根得食不答得若如蘿蔔波等連根可食如芥等必須去根如但淨過不便去根或亦可食故言得此或為道路中不便造作而說餘當隨便可知寄物可取問第八十九問若弟子遠行寄師物或師寄弟子物或僧具行李等物過期限而不歸還或經年歲所寄之物可取用不答若去時無言不教用者不得用何以故若知此人在是有主物若死是四方僧物或師或弟悉皆如是知在待回勿用知死應打楗槌散眾即得無咎若私用者亦當計錢犯罪輕重可知若彼此去時有言我若不還隨汝取用用者無犯教人不祭問第九十問若比丘教白衣不祭一切亡人為是理不春秋祭祀以時思之理之極也孝之至也教人不祭是理否答非不祭非理何也失於孝敬故也或言一死永絕更不復來既不能食祭之何益耶曰假使父母不食敬心供養亦得其福故當祭之為是經中之死之後食與不食有三因緣一者極善之人死後往生佛國或生人天極惡之人死後墮三惡道以是因緣不來受食有一等不善不惡者死後守塚還來本家受饗所以只宜勸人禮誦素齋祭獻或施法食起薦往生此名大孝存亡獲福故但勸莫令以牲為祭反招罪苦無窮慎之師資並坐問第九十一問若比丘眾中得共師並坐不答不接得共盤食師資之禮各有次序或正或傍如得並接相連輕師慢法有失儀之過不得但共一盤飲食無過不褰衣禮問第九十二問若比丘不褰三衣禮佛犯何事答眾多比丘禮佛應當以右手褰衣在右無壓之不然雖言禮佛汝輕衣故反失敬心故亦得罪眾多者必犯眾學戒突吉羅罪可知自手合藥問第九十三問若比丘得手自合藥不答被淨草得被之一字恐是彼字彼藥但用潔淨草藥不得用蜈蚣蛇蝎傷生等物以類惡律儀故苟遵神農本草黃連官桂等物無施不騐其功無限故云淨草得看病行醫宜察精微如或亂為反招過咎慎之休道復求問第九十四問若比丘休道意或過境緣一時退息道心而歸家已捨袈裟而著俗服經時或經年月向其俗尊禮拜然後又來投眾求復常位常即本也復其日常所作比丘之本位為應聽不答若不捨戒者應聽如捨戒者不得捨與不捨必須審察或問渠隣近誠信之人畢竟不破根本大戒可聽復位不然亦不得聽若祇犯輕但令慚愧懺悔改過亦得破落不贖問第九十五問若比丘知其父母兄弟破壞零落屬人或有缺乏等事將身抵靠男人謂之破落屬人而不購贖有罪不購者以財求謝之謂也答若為行道不贖無罪若修出世之道能拔父母生死輪迴之苦為大難有零落之苦猶其可緩所以不贖無過不然生身父母乃至手足至親豈得坐視而不為甘同異類之無情乎然而亦當隨力聖譽然可問第九十六問若人白僧稱言聖眾世諦善信見僧有德故此尊稱得然可言是不答不得然可何也聖即非凡四果四向等人始名為聖如凡俗濫叨聖位未得謂得大妄語成得罪非淺故云不可彼既尊稱必當悚然謙退而却之無過施聖受物問第九十七問若擅信等人持四事之物施比丘僧信心尊重言施聖眾比丘應受不答若比丘一總不言是聖是凡得分得取彼言施聖凡僧取者得無冐聖之過耶不也何以故以眾通有俗故凡聖同居龍蛇共處若聖在中我亦不知我自認凡正直無私所以不言分取無過遇水負渡問第九十八問若比丘行道過水途中或遇溝坑㵎水使人負渡犯何事答若不老病犯墮因前不許躑溝坑此處不許使負渡兩種都是年少比丘自憍輕傲不忍微勞失儀故制遇此只宜赤足斂衣徐步而渡之可也老病無力負渡無犯倩使僧奴問第九十九問若眾僧家奴灑掃執役之淨人餘外獨處之比丘得小小倩使不倩者差喚之意也些小細事或一日半日可得耶答小小取與隨取隨還得大事不得此人一身克於眾役勞若不勝汝若過差有妨大眾之功所不得罪同私用僧物故比丘畜爪問第一百問若比丘養爪甲長犯何事答犯墮爪甲垢穢律制但可留一麥許餘當去之有二過一類同俗流取於美觀生愛妨道故二因護其爪好懶偷閑不勤眾務故又佛以惡比丘相而訶之故犯墮浴無次第問第一百一問若上座比丘未浴下座於前浴有犯不答犯墮既分次序尊卑一應當分前後不爾失於恭敬與婆羅門聚會無殊故犯墮擊散籌洗淨持呪等具在他處不贅與物可取問第一百二問若他比丘器中忽應作或卜有異物或復弊故此泛指餘眾或箱囊摺袋等中或有珍寶奇異等物成有破弊朽爛等物不知誰許持戒比丘可取用不若無所用或奇怪不堪者復可棄不答與僧不得私用無主認者亦同僧物用必犯罪或恐後有認者私用不能辨白故云不得棄與不棄不拘不說遺物可取問第一百三問有一住處或即十方叢林等處多來去僧所有遺亡之物亡即忘也或是神神有重也神重珍寶之物非神明神像等也或是弊衣永無取用者可取不答亦不得私取與眾僧亦同僧物故眾僧應宜停止一月一歲之後方可得用恐有認取故若用後有主來索取當以僧物償之若所遺之物是貴珍寶眾後不能償者勿得用此義倣上但噐中與往來等意稍別白衣僧食問第一百四問若比丘有知舊白衣來造但是己分上故友或有益於叢林者而來相訪已得語上座維那持僧食與不維那聲論翻為次第謂知僧事之次第即知事人也答僧先令和不令不得眾中先有制令開許者得或僧不與而私和與者不得是僧物故與者得罪處眾自居者不可不知前師後師問第一百五問若比丘志不堅強捨道還俗後更出家更投一師秉法受戒前所投師還故是師非師耶答非是師捨前戒法故以後得戒者為師故雖爾不可缺於師禮以前獎導訓誨之德猶存故略而不說思之可見是師非師問第一百六問若比丘受戒時登臨壇所諸師僧可呼言師不答無此理何以故不從受法者蓋不得為師故師有匠成之能臨壇者大抵是闍黎教授等師僧即泛言隨喜等眾故所以羯磨教授亦可稱師無法受者不得為師故無此理此師似非得戒和尚下文可見然而泛常之禮亦當尊敬稱師亦不可以非師而慢之也諸師和尚問第一百七問若比丘一切師俱得呼為和尚不稱為弟子不答不得一切者正指三師七證也授戒本師可稱和尚得戒者當為弟子闍黎教授七證等但可稱不曰和尚不稱弟子故云不得然亦不可慢正可敬重如俗中之尊俗尊元非父母亦當父母之禮而敬之故作此例恐有不敬上中下座著宿者故制上雜事品竟下三自歸事品三自歸事品第十四欲受五戒十戒菩薩等戒先當歸依三寶若不歸依三寶戒不成就故言自歸者梵語南無此云皈命以身命而皈之故又云皈依皈者皈投依者倚附祈仗三寶威神護持之謂也華嚴云自皈於佛於法等有二義一者約事說即是皈依十方常住三寶如上依仗等說佛即十方三世諸佛也法即諦緣六度四無量等諸法也僧即十方諸大菩薩緣覺聲聞等僧也起越於九界之上至尊至貴故稱為寶二約理性具說名一體三寶福田論敘三寶曰功成妙智道登圓覺佛也玄理幽微正教精誠法也禁戒守真威儀出俗僧也皆是四生導首六趣舟航故名為寶近來有等杜撰偏執者教理不通動趣只譚一體三寶似乎沒有十方三寶誠為可笑此等愚痴外道縱有多知禪定現前廢事撥空盡成魔業有何益哉必須先通事相後明理性依理顯事攝事歸理理事雙融始名正智故知二義缺一不可也事者即下自皈犯不犯等事此品亦因度人事品而有隨其所問不必拘之時候故繼於此有十三問答三皈人受問第一問三自歸趣得人受歸趣歸向趣進之意可得是人皆受復有不應受者答除五逆罪得五逆者殺父殺母殺阿羅漢出佛身血破羯磨轉法輪僧此五業障深重必不能信向三寶故不得除此之外可信者多故得三皈所行問第二問受三自皈斯行何事當作何等事業答身口意不行邪見之事及不隨邪見師身無殺盜淫口離妄言綺語兩舌惡口意不貪嗔癡三業清淨即名正見故云不行邪事亦不隨三業不淨不正之師三自皈後當行此事何也皈依三寶即得五戒之體故也三皈所犯問第三問云何謂之犯三自歸信心真切正智現前不犯否者有犯故問答好邪見隨外道師即上身三口四意三惡業更有身見邊見乃至六十二見種種謬執不與佛法相應者俱名邪見外道如或好而為之隨而和之即犯三皈墮落只在于此若能反邪歸正始名不犯慎之三皈誰悔問第四問若僧若俗等犯三自歸云何悔對誰懺悔答向本受三皈之師前懺悔無師何也若無本師向餘比丘亦得當以所犯之事向本師前或餘比丘前稱自己名一一披陳求哀懺悔乃至再三其罪即滅其師當云懺後更勿再犯答云頂戴奉持還三自皈問第五問若三自皈不能久持或一年半年等有因緣故可得還不答得還承上文更問第六問若還還云何對誰人還答當向本師還無師若對餘一比丘言我弟子某甲世緣纏繞根基淺薄從今日已後不復能皈于佛皈于法皈于比丘僧如是三說即得還也若不滿三故成就三皈一說二說亦不得還此許還者乃如來隨其宿緣厚薄而化之無可強也若也畢世盡形受持更加陞追直至成佛堅持而不捨者始名正智若謂可還便生懈退者斷乎不可所以十地菩薩皆以念佛念法念僧為事況乎凡夫而便捨之報蓋業牽是誰之過歟慎之三皈悔逆問第七問或人若僧若俗受三自皈乃悔宿命惡逆無始劫中十惡五逆之罪為是理非理耶答無此理何也上文犯五逆者尚不得受三皈今受三皈安得便能懺其宿世惡逆耶假使百千劫所作業不忘故無此理有云能皈三寶諦信無疑藉其威力一切罪業猶如赫日消雪更不待懺如人犯罪於有司後投於王仗王之力縱有重罪亦當釋免云無此理者云何消會然而此經所說正為初受三皈者但皈十方三寶得受五戒猶在小眾事相故爾若能會得一體三寶深達實相了悟罪性本空懺無所懺則無惡不除無罪不滅所以云眾罪如霜露慧日能消除若欲懺悔者端坐念實相那時可作此說不然亦是未得謂得猶為不可當自思之各受三皈問第八問欲受三皈正得從一人受復得從三人各得受一歸不三寶似乎各別有體或也各從一人受得耶答不得三寶體一故所謂名稱三寶體自一如縱是十方三寶其體元同故所以但可從一師受即得若從三人似成破碎故云不得不同五戒各隨一師亦得故也三皈久近問第九問如受八關隨意不定受三皈法要須終身而受或有不能久持復可得一年半年十日五日不不拘久近亦使得耶答隨意多少此亦蓋形而受乃至未來等如上所說以為正理此言隨意者亦是如來大慈愍物如必欲其久持恐彼機劣憚繁總不能受以方便隨機令其漸入佳境而植因故爾智者亦勿因之而自怠也皈滿師非問第十問若從師受三自皈或一年半年自皈日滿後或還而不持此師猶故是師非師耶答一從受法終身是師豈一年半年捨即非師耶古云一日投師終身為父故當盡形禮敬始為智信之徒豈即忘其提訓之德可乎一皈二皈問第十一問三自歸依可得但受一皈二歸不或皈佛不皈法等可得耶答不得三寶一體理不可分受則同受還則同還若受一二亦同破析法身故云不得不同五戒隨意一二故三皈無師問第十二問欲受三歸現前無師得逢從文受不或對佛前依戒文而得受耶答不得若受菩薩戒千里內無能授戒師可許佛像前自誓受戒此三皈五戒乃至比丘戒俱不得何也若威音王那畔無師傳授則可威音那畔以來若無師授蓋屬天然外道故也不悔更受問第十三問若先受三歸犯不悔得更受不如上或有三業不勤或入外道邪見等俱名為犯答不得要當懺悔若欲當受捨先所受更受得答不捨而欲更受者不得若捨所受深加痛切竭誠懺悔內懷慚愧外託聖緣志心更受可得不然舊習不除枉費精神受亦不得上三自皈品竟下五戒事品問五戒事品第十五五戒者一不殺生乃至五不飲酒等此是在家出家優婆塞優婆夷所受之戒若受三皈五戒即得三十六二十五護戒神王恒沙眷屬而衛護之得生人天近涅槃道正法念處經云五戒不持人天路絕五戒精專人天交接固當先受三皈五戒以為眾戒之根本也事者即下文得與不得等是受三皈竟即得五戒故以此品繼之有十一種問答三皈得戒問第一問若不受三歸得受五戒不答不得戒本云先唱三歸次申五戒乃由十具重寅一乘准薩婆多論云先受三皈不說五戒五戒自得故云不受不得次申五戒名者令其識相持守而不忘故也所以三皈即五戒之本八戒十戒亦爾如比丘戒必須白四羯磨即得後說戒相亦是令其識相等不可不知也犯皈不悔問第二問若人已受三皈犯而不懺悔者得受五戒不答不得既云三皈即五戒之本今犯三皈即壞五戒之體故云不得必須慚愧懺悔洗滌淨器方盛甘露始得所以不悔不得未得清淨故懺悔之法不可不勉持戒久近問第三問受五戒法可得但受五日十日一年二年不或多三年捨而不持可得耶答隨意多少亦不限數此亦同上三皈等說然而阿含權教所開方等即不然方等會時優婆離問五戒可得十日五日否佛言不得所以如來制戒各有時機不可不知也犯戒不悔問第四問若住信人受五戒不悔得更受不答如不犯戒不捨不得更受前所受戒在故若有所犯而不悔亦不得捨或犯而悔悔而捨捨而重受始得不捨則誠意不新不懺則其罪不滅俱非淨器故總不得但能篤志堅持纖毫不犯即得增進後之眾戒皆藉此以為根本故也五戒俱懺問第五問若犯殺盜淫等五戒盡得悔不答若殺人人命極重婬其所尊逆天背理及淫比丘尼是清淨眾盜三尊財者三寶物或三師等物此必要償俱不得懺悔亦不得受戒餘者俱得懺悔戒可再受如神舊衣染洗再著故戒不能持問第六問受五戒者若不能蓋壽而行持亦得一年二年中間可還不答得還若還一二不還三寶若欲都還五戒者合三自歸一齊還薩婆多云捨三寶所以成捨戒以受戒時皈向三寶而得戒故捨和尚等例上可知下明還語言我某甲從今日去佛非我尊我非佛弟子如是至三法亦爾法僧亦三若還一二三四戒者或有必不能持者隨意還之但言我弟子某甲從今日去不復能持某戒或淫妄等或單持不殺戒亦可如是至三戒可得還若不滿三戒猶成就何以故從師受時三番羯磨三受而得故所以還亦應三可知矣或云不持則已何必用還曰若還戒者猶同俗人日後有過則輕戒若不還如後事過即名破戒罪為最重故不能持必須還之受戒破戒不可不知也准薩婆多中不必其三一捨便捨五戒沙彌比丘等亦不須三說又不必師等乃至自衣但解言音者就從而捨之問曰受戒時須三師七僧捨戒何故一人便捨答曰求增上法故須多緣多力捨戒如從高墜下故不須多也然而此經必用三者猶恐一二心不決定故得三說捨心纔決故薩婆所說要知求得者難求失者易如世間則寶之例寧不慎之哉五師五戒問第七問欲受五戒者可從五師各受一戒不或初心之人忖己力量或從一師先受一戒乃至漸次更發信心過緣增受一戒一師可得耶答得何也五戒體相不同作用亦別故一師五師俱得不同三歸三即一體合而不分但可一師多即不得與上彷彿恐濫故重制也偏重可還問第八問若住信等人既受五戒偏所重者可但分還一二不若在家出家其中俱有不能全持五戒者或偏重酒乃至或偏妄語等極易犯者分還一二可得耶答得還語同上偏重欲還者有等初發信心時非但五戒乃至大戒亦能時受奈何日久歲深宿習難忘道心漸退正所謂欲潔而偏染好正而固歪以至如是也此亦如來方便隨機故云得也萬祈全守以為勝䇿可知但受一二問第九問欲受五戒可但受一二三戒不答得隨意多少此亦同上隨機可知但上全受分還此則隨受一二然而五戒全受名為滿分優婆塞等若受一二名少分等所以亦是滿者為勝可知設或單持不殺等一戒精專亦作生天之因故云隨意也犯重可得問第十問若比丘犯重戒或淫殺盜妄隨犯全犯不定或犯酒戒得不答不得犯此戒者永棄於佛海邊外不得與清眾同居故云不得准律必須懺悔捨戒只許一生學沙爾戒乃至不得為人師範等不可不知嗚呼慎之勿為兒戲也然而酒是遮戒之首過失多端在俗尚禁況比丘乎故亦不得此一條應在雜事品攝當知釋家錯安於此八戒白衣問第十一問頗有八戒白衣不頗可也答無惟有八關齋白衣秪可受五戒故云無今或與白衣受八戒者非法非律斷乎不可關者禁閉之辭禁閉八罪不令起故然而亦即是此八戒一不殺二不盜乃至八不坐高床等兼非時食為齋齋以不過中食為體以前八事助成齋體共相支持故又名八支齋法是故言八不言九也唯此通俗人白衣受者以一日一夜為期日受日開此亦如來方便秪為在家人不能終身持戒者說以無終身戒故不稱優婆塞以有一日一夜戒故非非優婆塞但名中間人然而若持一日之齋必須精潔志誠可也如不精誠徒得處名亦無所益也慎之上五戒事品竟下十戒事品十戒事品第十六欲作沙彌當受十戒不受十戒則形同沙彌法不同沙彌十戒者不殺不盜乃至不捉生像等是事者即下持犯懺悔等事五戒之後當受十戒故有此品有五種問答五戒十戒問第一問經言重樓四級次第而登理應先受五戒如或不受五戒得受十戒不答若先三自歸竟即得十戒何以十戒中即有五戒故亦不必復受一受三皈即得五戒十戒故若不受三皈一總不得無戒體故可知不悔得受問第二問或犯五戒一二或全犯若不懺悔得受十戒不答不得若先不知有懺悔法或忘而失懺已受亦得若知而不悔不得護惜己非是不淨器故古云包藏瑕疵佛不許可所以自知有罪當懺悔懺悔則安樂自然得戒可知師犯從受問第三問若師犯重戒四棄等戒弟子從伊受十戒可得不答不得師即和尚也德臘俱全方可為師自既犯重尚非比丘安能度人譬如乘船渡海船若破漏能度所渡俱沈故曰不得所以欲求出世等事不可不擇其師也慎之倣同前義問第四問此下約義應問闍黎等事其文即順上問師犯即和尚故若言弟子前有犯五戒等一條已問過故應問云若闍黎等師犯重戒殺盜淫等弟子從之而受十戒可得不答不得其義同上可知犯戒可悔問第五問若沙彌犯十戒一總俱犯盡得懺悔不答同上五戒同上犯五戒中殺人等四法不得懺悔除此縱犯十戒亦容懺悔捨過重受亦可次等陞進不然總成廢器不得受戒之人必當謹攝身心勿令漏洩方成法器也慎之上十戒事品竟下沙彌事品問沙彌品第十七梵語沙彌此翻勤策勤修眾善䇿進心行又云息慈息世染而慈濟眾生故沙彌更有二種七歲即曰驅烏沙彌十歲已上至十九乃曰應法沙彌二十歲滿方曰比丘若二十歲外受沙彌戒者此云名字沙彌然而此品只應以沙彌二字置於前品十戒之上合為一品為正合譯家更立品名似繁亦無所礙文中有十種問答悔可須眾問第一問若沙彌有過欲懺悔要須對眾不答不須眾若比丘犯僧殘等法必須二十僧中懺悔今非比丘故不須眾但向本師懺悔得了下開若現在無師向餘一比丘前懺悔亦得決了例上懺三自皈可知半月說戒問第二問沙彌半月一說戒不亦同大比丘半月半月誦戒羯磨可得耶答無此理所以爾者何也以沙彌戒不成俗人然終已可說既非俗人待後受過具戒滿五年知五事然後可說豈沙彌便預於大比丘數耶故云無此理但須每月十五日一集祗可集於比丘眾中聽戒羯磨可得不然躐等失次其過不小戒之同類可懺問第三問若沙彌犯所受戒得還向沙彌懺悔不答不得何也以沙彌智淺不知持犯重輕不能典人羯磨出罪故云不得但如前文向本師懺可得僧著俗服問第四問出俗沙彌得著俗服不答不得如前沙彌欲受大戒不得著俗服故既作沙彌三衣不得苟簡一鉢常要資身不然形服不稱非俗非僧故云不得師違弟捨問第五問若師有種種違法事或違佛教販賣不淨活命等事或犯戒見威儀沙彌得捨更求師不答得師即和尚准薩婆多論和尚有四種一有法無衣食二有衣食無法三有法有衣食四無法無衣食上三可依而住後一不得依住縱有衣食非法即得捨而別求良導故云得叛師復來問第六問若沙彌叛師反背於師以隨白衣師藝業等師綜習俗竟不捨綜機縷提挈之綜也沙彌隨俗牽習俗外諸般伎業等事而不捨或經年月吏欲出家還來投師還投所叛之本師復作沙彌此還者故是沙彌非沙彌耶若故是但悔過而已不須更受戒耶答故是沙彌但向本師懺悔叛師習俗之過即了本不捨戒不得更受受亦不得戒若或犯戒應懺應捨必當重受決擇身心更無疑慮也賊抄得迯問第七問若沙彌為賊所抄被賊擄掠而去經歷或一年或一月或轉經主賊得主物沙彌得迯不答若未經主得迯轉經主不得是有主物故欲去當償本物無過無物可償但念宿𠍴固當自守待時可也師擯復來問第八問若沙彌犯禁犯佛所禁邪見等事師僧俱已擯謝不依佛教理應作擯作擯之後可許得更出家不答若不捨戒故是沙彌可懺而已若已捨戒元成俗人欲更出家懺捨重受可也沙彌本師問第九問或有在家白衣時從沙彌受五戒沙彌是師也然後白衣出家受大戒更有一大戒師前者本師故是沙彌大戒白衣得呼為師不答得呼為師一受其法身是師故但不得為其作禮以違戒臘尊𢍉故沙彌應作禮師反禮於弟子者何也論戒之大小不論前師之事故下例同白衣時從尼受五戒然後出家亦爾亦同上文尼禮白衣大戒比丘或比丘尼無不皆爾但論戒之大小等故貪物犯事問第十下復問比丘之事問若比丘貪資之物應云貪畜一切資財什物犯何事答其罪甚重譯家缺略以註補之三界往來六道流轉皆因貪愛以為根本縱貪嗔癡墮落三塗經受無窮之苦故云甚重向下引證昔有一比丘貪著一銅鐃愛之不捨以貪著故死後作餓鬼死者所遺衣物大眾羯磨而分眾分物竟其鬼便來現其身絕大黤黮即黑也如純黑雲諸比丘驚恠言此是何物眾中有得道者言是死比丘既是比丘何至如此貪著鐃故墮餓鬼中今故貪惜來欲索之故至於此諸比丘即以鐃還之鬼既得之使捉舌䑛放地而去諸比丘還取之而絕臰不可近且無所用復使人更鑄作別器猶臰而不可用下結以此驗之知貪為大患戒之慎之下又引一事比丘貪著衣服乃有自焚之酷引證昔有一比丘喜作衣晝夜染著或𢱈晒勤勞乃至得病困篤自知當死便舉頭視衣內起毒想言我死後誰敢著我此衣服者是我勤苦之物那敢現成得之不久便命終毒念在心作化生蛇還來纏在衣上眾與死比丘出燒塟訖遣人往取衣物欲打楗槌羯磨見蛇纏衣人近即腢中吐毒不敢近即還白眾具說所見吐毒等事諸比丘便共往看之都無敢近者有一比丘得道便入四等觀慈悲喜捨四無量心即名四等四等觀毒不能中便往近之語蛇言此本是汝在日衣今汝死非汝所有何以護之此蛇便即捨去不遠入一草中毒火出然其草還自燒自命終即入地獄地獄一日之中三過被燒結云如是等若皆由貪害三界緣生萬法不實物之資道則可多畜則不可以此觀之欲來求出世道必也去貪嗔癡如或不然出世之道必不能成就也亦當戒慎上沙彌品竟下歲坐悔文歲坐竟懺悔文此文應繼歲坐品後前文四月十六日歲坐安居乃至八月十五日解制受歲故云歲坐竟等懺悔者梵語懺摩此云悔過懺則止斷未來非悔則耻心於往犯故云已作之罪願乞消除未作之罪不敢更造文明能詮之文以顯所詮懺悔之理故此處目連所問之事俱是比丘歲坐中當行當止之法盡情問答已畢若比丘依而奉行必無過咎聖道畢竟有成然而坐滿出期恐有微細罪業應當自恣發露懺悔故有此文此是佛所教勅略去尊者問辭應問歲坐竟懺悔云何答言應差堪作羯磨者為眾作法云爾若僧聽應云若僧時到忍聽和合僧差某甲比丘為眾作歲坐竟懺悔法多薩阿竭此云如來如來所行受歲結坐比丘應爾依佛所行受歲結坐我從歲始四月十六乃至五月十五為歲始至今歲竟七月十五或八月半為歲竟六月中多所違失三月而言六月者西域一月分黑白二月故違失者戒律中所犯之事即五篇等事也除二鼻貳事餘不除二鼻等者非指六根中鼻根也鼻者始也二鼻指五篇中初二篇謂之二鼻貳事指四波羅夷十三僧殘為二事此二禁戒必無所犯故云除二等下陳說中自明餘指後三篇威儀輕戒未必不犯故云不陰下威儀一句可知向下廣上如來等句是世尊集和僧所教勅此是世尊歲坐竟教勅作法等事我等今者亦爾故今我是思惟作念共諸君發露披陳而說所違失戒事如下所明君者公也謙敬之辭君各忍受忍聽作法受戒懺悔下正陳所懺之事我若九十日中無世尊定那伽大定無世尊智廣大之智無世尊戒畢竟清淨無作等戒故多有所犯一說下第二第三亦如是說云無世尊智無世尊戒故犯無世尊戒故犯無世尊智故多失教事教中所詮是無生理智能破惑無智失於觀照不能破惑入無生理故云失等無世尊定故多犯亂意定能治亂以無定故亂想不除故多亂意何等亂意或念欲法不行欲事念即亂也俱有念實無所行或念盜法不行盜事或念殺法不行殺事或念欺法不行欺事欺即妄也或念十三僧伽婆尸沙法不行僧伽婆尸沙事比丘執身未制於心雖爾亂意一生正智不切不能入道亦應懺悔下文結上所犯之事此九十日所犯事通威儀但起念無實犯悉同下三篇之威儀戒故云事等若準律中更有受歲自恣羯磨等法受歲者安居日滿僧尼受歲律中佛許十四十五十六日解夏自恣集眾行籌等同布薩法但以自恣字替布薩字應差二人各具兩種五德者謂不愛不恚不怖不痴知自恣不自恣此五名自恣德又知時不以非時如實不以虛妄利益不以損減柔軟不以麤獷慈心不以嗔恚此五名舉罪德意欲無諍令人懺悔美德外彰能善勸喻離過憫物故差二人各具兩種五德者也上座籌量令人白二羯磨差之索欲問和如常末後答云差受自恣人羯磨羯磨者牒云差受自恣人羯磨牒訖白云大德僧聽若僧時到僧忍聽僧差比丘某甲某甲作受自恣人白如是作白成否或引講者答云成大德僧聽僧差比丘某甲某甲作受自恣人誰諸長老忍僧差比丘某甲某甲作受自恣人忍者默然誰不忍者說僧已忍差比丘某甲某甲作受自恣人竟僧忍默然故是事如是持羯磨成否答云成五德受差已至上座前胡跪作和答云單白和僧自恣羯磨和已對眾白云大德僧聽今日眾僧自恣若僧時到僧忍聽和合自恣白如是作白成否答云成白已令人行草人各剪次第行之各說偈云吉祥長者施軟草如來受已成正覺我等比丘學佛慧坐草自恣淨三業行草已訖五德至上坐前胡跪告云一切僧就草坐偏袒右肩胡跪合掌僧皆依唱次正對僧自恣法第一五德至上座前大敷坐具胡跪合掌上座亦胡跪合掌眾僧皆隨上座儀式應云大德一心念眾僧今日自恣我比丘自恣竟便作禮而退後有多文繁瑣不引律中又云僧十四日自恣尼十五日相依問罪故十六日方得出界問白衣欲出家比丘即受更為請師不故是師非答非師若從受法者可為師若依隨者可為依止師此是度人事品第八問釋過宜衍問若有比丘不捨作沙彌戒即大道人而更受戒為僧不答得應云不得問若不得戒前所受戒故在不答在問復師是非答非此正同上文受戒品中第四相同此處正無或字只作一人看可也問多人受戒而并請一人為師可得十五人一時受不答無此理問沙彌受大戒請一比丘為大戒師而此比丘不知羯磨及受戒法受轉請一人與受以何者為師答與戒者為師是無法非師此是為戒事品中四五六七八五條釋過宜衍雖爾經文無敢擅移故留之此下有十八種問答但應在雜事品中譯家遺漏故復置此五戒通受問第一此中缺一問答應問言授五戒比丘惟得授於婆羅門居家等人更於餘者尼亦可授否應答言得但五戒眾戒之本一切可受然而若與受時比丘不得問其中間所犯細事問者犯僧殘受戒之先必須審戒在家男眾細問可得一切女眾但可問其大略不可問其細㛱等事若問令彼慚惡故犯此罪以同粗惡語故為師範者不可不知不施得物問第二問若比丘於四事等一切所有是助道之物如王者不全施比丘強以全施得不佛世西域僧中四事等供皆出施國王等人故舉王者而問今通眾信可知答王者不嫌難滿難養便得取之嫌即不得若不全施而強索者即墮惡求多求之過故但隨其所施知足而取可得見過不呵問第三問若比丘見人行欲不呵犯事不答前人可諫應諫令其改悔若可諫而不諫者犯捨墮若兇暴不信不可諫者向一比丘好發露懺己不能諫人之過亦得不然有犯不教悔罪戒故犯事受戒問第四問若比丘先犯事或犯輕重不定等事犯後欲求懺悔更受戒得共住不答犯重不得更受大戒准律中捨悔之後一生學沙彌戒乃至一生不得為人師範等可知若犯決斷講過得講者亦如律中作法對二十僧中懺悔得與受戒悔後或更作而更悔亦不得與之受戒況得共住耶此亦同犯重永棄佛海邊外等事無異也文中影略若犯餘輕戒者隨意懺悔可得然而若也因聞可懺而故犯者亦非清淨僧也慎之丘戈同往問第五問若有急事比丘持弓箭上船無事比丘可隨去不急事等者或過賊𭁵等防護於身或被捉充兵役結陣禦敵不免持此器械而行清淨比丘見當迴避不可隨行此含二問答主犯重寄載犯捨墮此雙答兩問既求出世寧捨身命不可為之主持凶器必有傷害之心故犯重寄隨不避譏嫌亦違佛教故犯捨墮逼為非法問第六問若比丘官逼作非法或遇有司逼其所作非佛非律隨世不堪之法犯何事答雖被所逼亦不得作應云若作隨業大小得罪輕重寧捨身命必不可為始名勇猛丈夫慎之二男共戲問第七問二男共戲便止犯何事答成犯決斷此與雜事品中第十餘相同不必重釋盜聽行欲問第八問比丘盜聽二男行欲犯何事答無欲心聽犯捨墮此處應云有欲心聽身不失犯捨墮失即僧殘有心故有欲心聽身不失犯突吉羅此處應云無欲心聽犯突吉羅無心偶聽亦應呵諫應呵不呵故犯惡作必也厲聲呵諫自警警他始得無咎也是故當以有無二字換轉始得文順不然招難不但不諫抑且有心其罪更重既言有心未必不失豈止吉羅罪耶必翻譯傳寫有悞智者詳之病可乘騎問第九問若比丘病不能行得乘車馬不答雄者盡得因病故得無病如前有犯雌者無想犯捨墮縱無有想知即不應故犯有想出身犯決斷不知是雌無罪因病無心所以無犯倘一知即捨墮懺亦無過咎嫌經變賣問第十問若比丘嫌經不好賣去經詮妙義元無好歹或紙等莊飾精粗有別故賣之更作好者犯何事答賣經如賣父母罪同如人父母顏陋不堪為子嫌而貨之罪不容誅即同五逆故比丘嫌經罪亦如是以賣法身父母故戲鬪輸羸問第十一問若二男捔力犯何事抵戲競觸謂之捔或即二比丘或與軍士等賭力勝負有罪否答犯墮比丘色力強壯正好以忍辱大力精進修持方稱勇猛丈夫豈以血氣之勇而為之耶大失僧體令人譏誚故得此罪騐合畜生問第十二問若雞犬等畜生行欲比丘偶爾見之騐令全別離犯何事答犯捨墮比丘四儀常應攝心反照守護根門染淨之境皆不可著此乃縱心邪境故犯此罪若或起念夫身猶應決斷不可不慎小衣受施問第十三問比丘入聚落應披大衣若著小衣五衣行道留大衣在界得受人施不答言得何也行道受施為人福田然而三衣皆名福田偶爾有缺亦無有過故夏坐僧物問第十四問若比丘夏坐中間未滿得受檀越所施僧物不答若薄施大眾僧物等類即應分不得停如停有二過一增長貪心妨廢道業故二僧有去來失現前僧有故主者故違得罪因果有昧故然而文中應云如獨受信施者不得影略可知僧物人情問第十五問若比丘或有好知家相知檀越結事姿任之或作飯僧布施等事委代而任之更有異比丘從所任比丘乞其所有而得物任事者犯何事答觀主人意惡不得強與犯捨墮知主意好得取異者亦僧俱屬好事與者得者俱不犯戒鳥巢鼠穴問第六問若有鳩於人舍內作窠或在僧房之內比丘破其巢或塞鼠孔犯何事答鳩未有子得去空巢無過有子不得有傷害故鼠穴惟有一孔不得塞亦有傷殘故如昔羅睺羅於母腹中六年始生因生前塞鼠孔六日感報如是故若有內外孔憚其纏繞得塞內者亦無礙不然反與之食更妙魚雁相通問第十七問若比丘得與師及同學得作書不或師僧同學遠隔他鄉一時不及所事可得書信往來否答在他方情通情即禮也既在人事安得絕交略通書信以表問候之禮不犯若在異國不得何也異國往來王法所禁故違禁得戒問第十八問若人出家王法軍匠灶戶王法禁之不聽父母不聽或長子獨子父母愛而不捨如是兩端違言出家為得戒不答不得律犯輕遮尚不得戒王法嚴令父母慈訓若也不聽即違佛教故不得孝順隨從此即是戒何也孝名為戒故今人欲求出家當觀佛教而自慎之上來正宗已竟下流通分分四一讚請流通爾時問答已畢之時目連從坐而起白佛言世尊快說毗尼如來發明如上所問之法甚為慶快故然於如來滅度後正今後五百歲魔強法弱之時誰能受持如是毗尼二說示流通又分二一信者入道佛言目連思學毗尼者末世眾生若善根深厚聞如是法思惟好樂慚愧生信者當知是人能修行如是毗尼二謗者輪迴佛告目連吾滅度後若有比丘比丘尼誹謗如是毗尼者及上思學當知是人是魔朋侶非吾弟子即如佛世願應相似如是人輩俱是邪見撥空外道世世學道不成長淪苦海不出三界三總結流通吾今憐愍諸眾生輩故說此經而教化之若果如上思學修行者是真佛子即出苦渝成就佛道必也四信受流通是時目連聞佛所說輕重等事歡喜奉行歡喜即信受意有所領略悟入篤信無疑故云歡喜奉者遵奉行者篤行即以此法自行利他流通於天上人間普遍於微塵剎土繼遐方於萬古續慧命於千秋使永遠無窮故曰信受流通也或曰諸法從本來常自寂滅相又經云修無相正觀即得菩提烏得以此五百事相而修為豈不太繁瑣者哉然而不知世尊說教有權有實先以毗尼戒相開發于初機後以最上一乘攝歸于無學所以一心不妨於無量無量不外乎一心若也初心不守律儀放曠總成邪見後心不達實相勤修終是有為畢竟當知事不越理理不礙事事理兼持了無偏廢者始得名為正觀也慎毋以藉口輕譚瞞頇後學自悞悞人其過非小也故特書之以誡上卷較譌第七紙七行問字疑衍文十九紙九行而比之比疑當作此音釋佉丘伽切螫施隻切蟲行毒僥倖僥堅堯切倖下耿切僥倖覬覦非所當得也貫嚫貰始制切嚫初觀切唅胡南切與含同下卷較譌第二紙七行合覆之合宋南藏作令第二十紙四行角力之角南藏作捔音釋擘博厄切釽也𠹀音遜與潠同噴也跳躑跳他吊切躑直隻切搪徒郎切搪觸也購贖購居候切以財相求也贖神欲切以財贖罪也黤黮黤於感切黮徒感切黤黮黑也䑛神紙切餂也臰尺救切腐氣也酪枯沃切傪也
