body:
  text: 失譯人名附東晉錄明姑蘇報國寺弘戒沙門性祇述將釋此經大文分二初釋題二釋文釋題二初正釋題目經通五人所說言佛說者揀非菩薩天仙化人是釋迦如來金口親宣以非他佛不別立名故但言佛說也離而釋之佛者覺照義覺者破大夜之重昏照者朗萬法之幽邃乃至自覺覺他覺行圓滿等俱如常解不引說者悅也佛以八音回辨觀機應病稱悅眾心故云悅梵語目揵連此云采菽氏亦如常解尊者神通第一切為物情逆知末世眾生雖云學道戒律難持來時救弊故興此問使吾世尊一一發明令人進修有地實乃大權示現行菩薩道也防非止惡曰戒調伏身心曰律又文殊淨律經云調伏恩愛塵勞曰律曉了貪欲故云為律戒相不勝其廣略申五百而統之言輕重者在五篇中而為輕重如四波羅夷為重十三僧殘為輕僧殘為重捨墮為輕乃至提舍尼為重眾學為輕事者事相即五篇五百等之條相也其問一有所犯者遇知律之師或諫或治或自知而懺悔更不再犯如是修行調其三業制伏過非即名正智此乃初心入道之階梯輕重事相寧可缺乎不然放曠身心全無羈勒事行不諳撥無因果而非罪福莾莾蕩蕩自招殃禍者過在於斯矣嗚呼近來一等狂妄初心出家未幾經教未通戒律未明聽信一等狂騁之師未得謂得開口便言我修大乘頓教超佛越祖悟道在心不在戒相何用如是繁瑣反拘乎身耶如是等非議多言不能盡述惜哉此等之流蔑裂戒律輕毀聖言吾亦不知其是何心行歟此即執理行廢事行不達理事無礙者之過也梵語素怛覽此云契經契理合機故云契經又經者徑也即下五篇五百乃脩行入道之徑路心欲依此進修始從博地凡夫直至薩婆若海莫不由斯而入故也餘有五重玄義乃至人法等釋俱詳他解不贅次釋譯人名譯人失名者據新疏有多義或彼時朝廷事多不暇請奏或翻經少行道不久有事西歸未及傳名於此上故乃至後秦羅什翻經大弘聖教所譯般若維摩法華等經智度百門等論故云附東晉者必也是乎晉有東西者始以武皇帝司馬氏受魏禪建都於洛陽西晉遭亂元帝渡江復建都於江東即位建康故曰東晉錄者有云唐宣律師內典錄也俱俟再考初釋題竟二釋文分三初序分二正宗分三流通分序分二初通序又二初立品名五篇事品第一五篇者如下所明應當學至波羅夷等是也篇者編次也章段之義事即事相即下五種事跡是也品者義類相從曰品亦章段之義但彼此總別略異也次入文如是我聞一時佛住王舍城迦蘭陀竹園如是指法之辭如是之法我從佛聞自我親聞非胸臆之談亦非私淑之說也師資相契機教相投之時故云一時佛說法之主亦即釋迦牟尼佛千王所住之處故云王舍城也迦蘭陀者經律皆云山鼠之名也時毗舍離王入山於樹下眠有大毒蛇欲出害王樹上有鼠下來鳴令王覺王感其恩將一村食供之即號此為迦蘭陀村村中有一大富長者王即賜號迦蘭陀長者先以此園施諸外道後見佛又聞深法恨不以園得施如來時地神知其意為現灾怪怖諸外道逐之令出告長者曰欲以園施佛汝宜速去外道含怒而出長者歡喜建立精舍躬往請佛於中說法故去迦蘭等此是說法之處也但缺聽眾必譯人略之可知更有六種成就等亦詳他處茲不繁解通序竟二別序分四一當機起欲所問是時目連從坐而起白佛言世尊我今欲有所問惟願世尊發大慈悲為我演說起坐稟白師資常軌演者宣揚流布之辭此乃尊者為眾生故而發問也先白而後請問者以尊如來不敢輙問故二如來讚善許問佛言善哉汝所問者能大利益無量眾生恣汝所問善者能也因其所問必有所說使眾聞知必獲大利故此為饒益有情問故讚其能也三正問比丘所犯目連白佛言世尊末世比丘遠指今時受戒比丘比丘義亦如常解雖云受戒信根淺薄不重佛教不遵律儀所以輕慢佛語犯眾學戒梵語式叉迦羅尼此云應當學梵語突吉羅此云惡作又云惡說餘戒罪重易持此戒微細難持易犯常須念學故不列罪名但言應當學雜用三寶物且說十方常住招提等物彼此互用乃至侵剋等事總是因果不明俱名雜用當墮何處當機舉眾學雜用等二事為問意含五篇在內有犯如是等過各當墮於何等罪報目連非是不知但請佛答令人皈信而不疑故特以此請問四如來誡聽許說爾時佛告目連諦聽諦聽當為汝說諦者實也聽者信也佛所說法真實無異汝當息慮忘緣諦信而聽善思念之二正宗分分二初總明五篇以定輕重罪報之果下別明五百以應輕重報果之因初總明五篇分五先明眾學罪報承上說字來若比丘無慚無愧若者假若之辭既稱比丘當具慚愧慚愧者明信因果柔和知足之謂也經云慚愧有二一者慚自不作惡二者傀不令他作又云慚者慚天愧者愧人有慚愧者可名為人若不慚愧與諸禽獸不相異也設或有此無慚愧人罔自尊大而使輕慢佛語犯眾學戒齊整著三衣內衣乃至人持葢不應為說法百法之內隨犯一法而不懺悔者當墮地獄之中受大苦惱有多少時分下明罪報時分如四天王壽五百歲墮泥犂中四天王居須彌山腹日月遊行之所東方持國南方增長西方廣目北方多聞各有統領等故名四天王俱舍論云人間五十年此天一晝夜梵語泥犁耶此云地獄總有十八三十六百八等之不一秦言無有無有喜樂無氣味無歡喜故云無有或言卑下或言墮落中陰倒懸諸根皆毀壞故或言無者更無赦處此初篇所犯者墮等活地獄謂彼罪人手生鐵爪相摑肉墮或獄卒唱或冷風吹活兩緣雖異等一活故於人間數九百千歲其數應該九百萬歲千者筆悞何也人間五十年為此天一日一萬八千年為此天一年十八萬年為十年一百八十萬年為百年五百年五得五百萬五八四百萬理應九百萬歲可知矣此處與最後有地獄經佛齋等經各有數量大略相倣故不繁引當知犯此最後極輕之過尚受此等長遠之苦況後後重重之苦耶學道者寧不慎之哉二明提舍尼罪報犯波羅提提舍尼梵語也此云向彼悔從對治境以立名有四無病自手受食等如律所明此罪應發露又云悔過法下明時分如三十三天壽千歲墮泥犂中此忉利天也居須彌頂此四方各有八共三十二天圍遶聽帝釋說十善法以為其主故云三十三論云人間一百歲比天一晝夜犯此戒者墮黑繩地獄等苦以熱鐵繩絣量肢體後方𠼗鋸故於人間數三億六十千歲歲數言三億等者億有多種不同有十萬為億百萬為億千萬為億若以千萬為億者億字不悞六十千者筆悞十字應改千字何也當知依前九百萬歲四倍加算的有三千六百萬歲故三波逸提罪報犯波夜提亦云波逸提此云墮墮於眾合地獄此有九十法始於知而妄語終于如來等量作衣但略尼薩耆波逸提俱詳比丘戒本可知下明時分如夜摩天壽二千歲墮泥犂中梵語須夜摩此云善時分又云妙善又云須燄摩此云時分時唱快樂故或云受五欲境知時分故人間二百歲此天為一日十云墮在燒煑覆障地獄八熱通為燒煑八寒黑暗通為覆障於人間數二十億千歲此中歲數亦當依前第二篇中四倍算該一萬四千四百萬歲是實此億應以萬萬為億也此中二十億者亦是傳寫有悞可知四偷蘭遮罪報犯偷蘭遮梵語也善見律云偷蘭名大遮是華言謂遮障善道華梵雙舉也謂犯此罪者大障善道墮于惡趣善即人天惡即地獄餓鬼畜生也體是鄙穢從不善體以立名者由能成四波羅夷十三僧殘兩篇之罪故又有醜惡二種之分如犯殺生妄語二種重罪成即波羅夷欲作未成即名惡偷蘭如犯淫盜二種重罪成即波羅夷欲作未成名醜偷蘭十三僧殘中當例此說如故瀉精等成則僧殘未成則偷蘭遮醜惡亦可知下明時分如兜率天壽四千歲墮泥犂中梵語兜率陀此云妙足又云覩史陀此云知足於五欲知止足故十地論名憙足謂後身菩薩於中教化多修喜足故論云人間四百歲此天為一日犯此罪者墮嘷呌地獄謂獄卒捉提人擲銕鑊中嘷咷大呌故於人間數五十億六十千歲此中歲數五十億等者常依前第三篇四倍算該五萬七千六百萬歲是實五億者亦以萬萬為億但六十千筆悞也五明僧殘罪報犯僧伽婆尸沙梵語也善見云僧伽者為僧婆者為初謂僧前與覆藏羯磨也言尸沙者云殘謂未後與出罪羯磨也若犯此罪僧與作法除故從境為名也毗尼母云僧殘者如人為他斫殘有咽喉故名為殘理須早救犯此罪者急須懺悔者可也即是初弄陰失精至終於惡性不受人諫等下明時分如不憍樂天壽八千歲墮泥犂中墮大嘷呌地獄如上解梵語須涅密陀或尼摩羅大論云秦言化自樂即化樂天自化五塵而自娛樂故今不憍者憍逸也以自化樂無憍逸故楞嚴名樂變化天人間八百歲此天為一日於人間數二百三十億四十千歲此中歲數云二百三十等者當依前第四篇中四倍算該二十三萬零四百萬歲是實今經二百等者此以千萬為億也四十千即四百萬歲可知六明波羅夷罪報犯波羅夷即淫殺盜妄四根本也梵語波羅夷僧祗義翻極惡又云棄罪邊罪犯此罪者永棄於佛海邊外不得與清眾同居如大海下著死屍相似佛法大海不著破戒死屍故極惡有三一者退沒由犯此戒道果無分故二者不共住非但失道而已不得於說戒羯磨二種僧中共住故三者墮落捨此身已墮在阿鼻地獄故四分云譬如斷人頭不可復起若犯此法不復更成比丘行故下明時分如他化自在天壽十六千歲墮泥犂中此墮焰熱地獄謂獄卒置罪人鐵城中火燄燋爛由燒炙眾生故墮此獄梵語婆舍䟦提或云波羅尼密大論云秦言他化自在此天奪他所化而自娛樂故別行疏云是欲界頂天假他所作以成己樂即魔王天也人間一千六百歲此天一晝夜於人間數五百二十一億六十千歲此中歲數五百等者當依上第五篇中四倍算該九十二萬一千六百萬歲是實此亦當以萬萬為億五百等者亦皆筆悞自當察之嗚呼痛哉以是觀之修行學道受戒之人不可不慎一有毀犯依上所說受如是苦無窮者也罪業報應教化地獄經云信相菩薩白佛言世尊今有受罪眾生為諸獄卒剉碓斬身從足斬之乃至其頂斬之已訖旋風吹活而復斬之何罪所致佛言以前世持齋月殺生不信三寶不孝父母屠兒魁膾斬截眾生故獲斯罪其間更有鑊湯爐炭劍樹刀山寒氷剝裂種種諸苦不可勝言皆是生前所作殺盜淫妄飲酒昏迷無智慧心造諸惡業受斯罪報受罪眾生白世尊言作何善行得離斯苦佛言當勤孝順父母敬事師長皈奉三尊勤行布施持戒忍辱精進禪定智慧慈悲喜捨怨親平等同己無二不欺孤老不輕下賤護彼如己汝等若能如是修行則為已得報佛之恩永離眾苦乃至不墮三塗八難之處地獄休息苦痛安寧是故當知苦樂罪福本罪天降亦非地生又非人與唯是自心之所招感也故應戒謹恐懼慎毋忽之一者要明戒相二要攝持一心謹潔無犯猶若氷霜如名清淨持戒之人也珍重更有破戒有五過失具如四分略解之後可知以上總明五篇以定輕重罪報之果已竟下別明五百以應輕重報果之因有十六品初佛事品至第十七沙彌品且初佛事品問佛事品第二佛事者或塑𦘕聖像葢造佛乃至禮敬供養三寶等皆名佛事下言佛物者皆為此事而有也佛為最勝之尊事為最大之事遵行者功德無邊違忤者罪報無盡先問於佛事後以法僧等事而次第問之凡三十七條問答佛物可移問第一問凡問之一字即是目連尊者請問世尊之說佛物先在一處佛物者即指塑𦘕佛像葢造佛堂乃至本處佛前所供香燈幡葢鐘皷等物也若有比丘齎至餘處作佛事犯何事必得何罪答凡答之一字即世尊答目連尊者所問之言犯棄極重波羅夷罪報如上初篇所明此以貪心為利移此作彼互有互無因果有錯與盜佛物相同故犯棄罪所以一切佛物都不得移動一切者統該之說犯罪亦例上下開若有事難眾僧盡去或有水火刀兵王賊等難眾僧必不能住者當白眾若眾聽得賷至餘處佛事無罪眾若不聽則亦犯罪如上人王之物尚不敢移法王之物理當尊重故不可也物易供器問第二問佛物當指塑𦘕佛像餘剩之物可以得買供養具供佛否答得總是佛之受用皆令施主得勝福故若供神道等即不得造堂與賃問第三問佛物造堂與直可賃否賃者即今租典之謂也物亦指塑𦘕所餘等物將此造成私堂人或與直賃之得所直物私用可不答一切佛物得買不得賃以佛不同世人有所取物故此堂當供養佛如不造堂佛物所餘當買供具供佛則可如造堂賃用因果有差與盜佛物罪同斷不可也人或欲買此堂應如下文五倍價所得之值原作佛事始得無咎佛物借使問第四問比丘作佛事或在寺院或檀越家供養三寶禮懺誦經等雖云法事即是佛事事完檀越或以佛奴等而作謝儀比丘得佛奴牛驢馬若自若他得借使不答若知本是佛物不得互用佛物故如不知得何以故以非法得故以全不知是佛物亦不知檀用有罪故得知而故違得罪佛奴者用佛物買之佛前使役者是也僧地作籬問第五問僧地起塔用佛物作籬籬裹可住不僧地僧塔理應僧住籬既屬佛僧可住否答若知佛物而故入犯墮如上眾合罪報不知不犯若知故住或有知法者一諫乃至過三諫犯決斷此以殘罪決定斷然不可改故名決斷犯此罪者墮大嘷呌地獄亦如上說過四諫轉犯重如上炎熱地獄等罪言諫者應云大德此雖僧地僧塔籬屬千佛用佛物者不善勿住於此住地得罪一違佛語二差因果斷乎不可如是一二乃至再三和顏教誡而開示之令其知過速改懺悔故云諫諫之不懺不改即犯此罪如為堅勞守護者縱是佛籬乃至佛塔亦無所犯懺僧殘法詳明四分略解故財施僧問第六問先佛堂壞頹毀曰壞主人更出私財作堂後有施主重用己財作佛堂用故財所遺磚瓦木植等施比丘比丘可取不答言不得以佛物故不得計錢犯罪又不得餘用畢竟何如但以佛前隨分用之不廢前人之功亦可十分爛壞者或也無過僧護經云昔有比丘私取破佛剎住用搆己房後感地獄之中報為大柱焚之慎諸佛籬僧地問第七問僧地僧家種作等地佛物用作都籬總籬垣障護之籬裏先有井菓菜可食不答不得井依下文應作并既是佛物為籬即屬于佛故云不得下開若是檀越物作佛事先要以菓并菜施僧得食供佛而後供僧未供佛僧不宜先食故不要不得食或買用價何如若買五倍價一錢五錢買食斯價原用作佛事無過若知是佛物不用價買而趣自食者計錢多少犯罪重輕知而故違貪食悋財故得罪律云值五錢犯棄五錢者西域一文準此方十六箇小錢一分銀八文算值一錢銀者犯重若減五錢偷蘭遮等又云西域之錢有金錢銀錢之不定茲不繁引佛債宜償問第八問欠負佛物物云何償當加利息否答直償本物何不加償以佛不出入故所以不加償放債起息等名出入雖爾故入地獄互用佛物因果難逃故下文引證昔佛泥洹後必是迦葉涅槃之後也泥洹即涅槃之異稱有一比丘精進聰明行解俱全有一婆羅門見比丘精進聰明有德持女施比丘作比丘尼求出世解脫法故比丘即受其女姝好因美麗故比丘後生染意作不淨行㛱媟之事棄罪可知共生活同住營業而已用佛法僧物各一千萬錢用衣食而此比丘極聰明因有行解能說法使人得四道果既能利人何不利己所以自惟罪深重用三寶物等故罪重便欲償之即詣沙佉國乞大得錢物還欲償之道路山中為七步蛇所螫螫者咬而行毒也此處即是業感所招比丘知七步當死故云七步蛇六步裏便向弟子言何處償物遣還本國所償之處不一故言何處囑付言汝償物已還我住此待汝弟子償物訖還報之即起七步便死墮阿鼻地獄中初入溫暖未至大熱自知謂是溫室聰明有省故便舉大聲經唄呪願唄即梵唄即此士之讚辭地獄中諸罪人鬼聞經唄者開悟而得解脫故有數十人得度出地獄獄卒大嗔便舉鐵扠打之即命終生三十三天下結上文而誡云以此騐之佛法僧物不可不償因償故雖復受罪故得時出矣意含不償地獄難出地有三過一者貪心罷道犯重二者用三寶物三者難消信施故爾然而猶藉經唄呪願之功而得至此不得此功猶亦未能出於惡道也所以念佛經呪功德無窮於茲可見塔塵餘用問第九問佛塔上掃得土棄之有罪不塔有多種佛塔十三層辟支塔十一層羅漢塔四層輪王有塔無層此佛塔者十三層也阿含經中有三意造塔一表人尊勝二令他生信三為報佛恩故每勤行打掃毋怠答得棄不得餘用既言佛塔即是佛物故當知徹物尚爾大者可知矣佛法深細以至如此防微杜漸令人知因果明罪福故云莫輕小善以為無福水滴雖微漸盈大器正在此也佛物取息問第十問若比丘以佛物出與人取子息用犯罪不息者生義如世俗放債求取利息答與佛物同體利由佛物而有故云同體用則俱犯重何以故出入合子子即利也與佛由故有罪無福何以無福以壞法身而為形故佛物即屬法身故為形者貪求佛物而養色身故嗚呼比丘信施猶恐難消況又以佛物起息而用哉故云俱犯重給使佛奴問第十一問若佛圖主圖者佛之形像也執守塔寺者為佛圖主遣佛奴小兒給比丘比丘可使不答不得使何以故以是佛物故此是洒掃伽藍添香換水佛前服役之淨人故云佛奴所以比丘不得役使擅用佛物得罪彌重圖主亦不可擅自給出慎之佛作得食問第十二問若比丘要與佛作得食佛食不即取佛物用買衣食得不答不得何以故比丘是佛之弟子尚無客作之理何況取佛物而作衣食用耶若比丘見佛堂傾圮或聖像頹零已有塑𦘕修葺之能發心而為之但取其功不取其利謂之佛作客作乃類土工水匠之流覓利糊口者故無此理違者得罪白衣佛食問第十三問若有白衣與佛作得佛物在家傭賃客作以覓衣食者作畢或佛分上財用此物作食請僧僧得食不答不得食彼既供眾僧宜食何以不得雖經白衣之手還是佛物故此是白衣養家活計在彼理當若在比丘知法犯法亦應計錢犯罪故云不得非佛作者不論審之佛事覓利問第十四問比丘若作佛事法事或代佛行化或與俗禮誦等事得捉金銀錢不答不得捉有貪慢心犯捨墮罪佛事法事或以禮謝世之常法若取錢財類于裨販亦同客作有違佛制故不得也教中比丘只應乞食不畜錢財或彼為法必有所施不可却者應轉作淨別作功德可也捨墮如上初篇罪報所明施主作福問第十五問若有人施牛驢馬奴與比丘造佛事刻雕佛相等法事印造經典等比丘可得受不答得受使用但不得費經中不得長養猫狸犬等牛馬許受者但隨順施主要福之心一時方便非常法也人或可留出家學道牛等物類賣即傷慈畜恐不能多容亦可當自知時弓刀軍器一不得受傷殘之器必非所宜亦犯所禁戒之莫受佛屋私寄問第十六問若有人施佛屋宅未用未曾供佛比丘可先自寄住不答不得信施供佛所以不得便是佛物故占佛所有亦得重罪日常洒掃待供佛後庶可隨便續明可息問第十七問若有施主續佛光明即是供佛香燈燈能照日月所不照處故曰續明晝可滅不答不得若滅犯墮佛有常光原無明暗何以得罪曰雖云佛無明暗施者得福故滅有罪施主求福本意晝夜常然汝若故滅違他敬信減他福故得罪無慎之像前食臥問第十八問若非佛屋非佛正或僧室禪房等佛像在中比丘可在像前飲食寢臥不答得下例況若佛在世猶於佛前受食寢臥況像前不得然而亦須傍肅不得輕背教中所制立佛前不許坐坐佛前不許臥故但臥須障屏帳等類而遮障之亦不得裸身放逸謹潔無咎若有燈光明不得足光中過住此光屬佛踐蹋佛光有過無福故若自另有一燈得古人尚下敢揣殿影況佛光乎動止威儀常懹敬畏無令疎曠失其正智入佛知見異妙方便亦在其中文淡義豐於斯可見闕遊塔問第十九問若比丘上佛圖佛塔佛墻遠望犯何等事如世俗人登高遠眺故云遠望答不知不犯若必有急難事上亦不犯難者或有水火刀兵等事也或知而故上犯捨墮塔圖之類一者是佛物二者佛像在於層層褻凟聖賢故得罪俗尚不宜況比丘乎古德云無事莫登三寶地等閑休向塔中行若非掃地添香水縱有輪王福也輕若遇知法者一諒隨即懺悔改過則可過三諫犯決斷過四諫故上犯棄諫語隨事可知學者當知慎勿輕視指前用後問第二十問若比丘指物造佛經或檀那所施等物更得他物後人所施之物不用前物但用後物得爾不答不得以許前物便是不然貪求無厭因果有差語言不實有此三過故不得也不論佛物法物前後所有俱用為妙福德多故佛繒私用問第二十一問若比丘得買佛上繒作衣不答不得此是信施上供佛前幡葢等類求福而來比丘貪心無愧私取即是盜用佛物令人退心理應犯重戒之形像好惡問第二十二問若比丘形相佛像犯何事答一切佛像不問好惡不得形相其罪甚重似波羅夷逆罪必不可為形相者形容觀相長短好醜也一切者即金銀銅木等夫如來相好慈威變現難可測量未成而相則可已成而相者決不可也加人父母好醜妍𡟎子得相乎故得重罪今之僧俗不知法者此過甚多慎諸慎諸相成更作問第二十三問人若緇若素等人作佛像鼻不作孔或失之也後人得作不答不得同上形相重逆之罪故云不得何也已成故也如人父母根有缺減子見不忍亦不能再作故世多愚見以此可戒佛墻倚物問第二十四問前來比丘上佛墻有過今佛牆上得持拄杖等物倚不答不得犯捨墮墻即下文佛圖墻如今之寺院等處繪圖三寶等像莊嚴於字壁問者是持物倚之亦即輕慢聖像故犯此罪下文引證昔有一比丘入寺禮佛有婆羅門知相相此比丘有天子之福相便語比丘言我有一女嫁與比丘今共罷道還俗比丘言須我禮佛還懷此意者就應損福比丘便持錫杖倚佛圖墻入寺禮佛已還出婆羅門便不復與語比丘問故與我女不索前所許婆羅門言不與何不與耶婆羅門言向見比丘有貴相故與今無復此相是故不與所以爾者消其功德故一者𧜼慢聖賢二者懷意不端正應爾也下警諫總結以是佛墻及塔壁不可持物倚既犯戒又消其無量功德律中細行三千八萬於此可見古云染綠易就淨德難成不矜細行終累大端初心入道者當宜自慎佛物人天問第二十五問若比丘以佛物得作天人世人畜生像不答佛邊得作非佛邊不得以是佛物故佛邊天者梵釋等是世人給孤獨等畜生金翅鳥等受佛所化常在座下護法受教故得作之無過度不知本問第二十六問若比丘度人不知本來來歷根源後度知是佛奴而不發遣犯何事後度二字應云度後文順答知而度犯重佛奴即是佛物故若先不知則已知便發遣懺悔無過若不發遣亦犯重知而不改其罪猶深故若欲度人必當察之為要慎之仍上再問第二十七問其人是大道不答非度人比丘因其故違佛制不懼因果無慚無智故非大道也然而佛奴者別有用錢買喚佛前洒掃使役之者非今名有行人發心侍佛執勞運力者比也今之學者慎毋錯認而便輕忽行行之人而自招殃咎何以故三世諸佛歷代祖師皆從行門而入道故思之作像取物問第二十八問若自有私財泛舉發心造像之人不定僧俗故云自有顧比丘作佛像作者能作比丘得取物不答不得此有二過一因佛所得即佛物故二既有此能彼此共作功德為妙若取物便同客作失比丘體故云不得佛幡佛事問第二十九問若有信施先上佛幡供佛之幡比丘得取用作佛事不幡者轉也轉惡成善故名曰幡答佛事得用或以別作佛前帳幔等用或小幡執之引道行香皆為佛事不以別用可得然而檀越不聽則不得何以故幡之功德風吹一動則有輪王報此是檀越要福之本故云不聽不得聽則可也通禮三世問第三十問得通禮過去七佛不答得何以以法身同故經中自有過去七佛現在七佛之中又分過去現在毗婆尸等是過去拘留孫等是現在言得者以三世諸佛名號雖殊法身無二故但能志心禮拜功德無涯更無過未之別故七佛名義四分略解詳明茲下引許三作一問第三十一問若人施主先許佛三會三作佛事或三處道場或三月等之三會然後比丘并之作一會因惜費悋資將三并一雖爾不得了其三會心願亦不成其三番之名目或三行香三布施得了三會之事不答言不得何也自違言有罪一貪惜二妄語應犯捨墮嗚呼末世比丘信心淺薄視佛事為兒戲寧不有諸自招罪咎可不慎哉懺罪越規問第三十二問若比丘犯決斷十三僧殘中之罪過得佛地中懺悔不答不得佛地者佛聖像前非僧作法懺悔之所言不得者准律中犯僧殘當強與波利婆沙乃至摩那垂等然後二十僧中與之出罪少一人罪尚不除況佛地懺悔無眾失儀而可得乎如沙彌菩薩戒人有遇懺悔者不論故寺齊畔問第三十三問若有久遠故寺年深湮沒四圍都無垣墻障隔基址踪跡亦無不知佛地遠近廣長深淺一總無據比丘若欲重作者云何得知齊畔答不知當以意作齊畔以不知故增損無罪意謂知即當依原額無過不知當隨施主財力多寡亦可無咎佛物神堂問第三十四問若比丘用佛物作鬼子母屋及作鬼子母像作者有罪不有鬼子母天其母生子皆鬼故以名之答同以佛物施人其罪甚重同上可知以尊作𢍉與墮落信施相類故又且比丘不得祀奉神祇此乃貪利失儀斷乎不可佛前禮僧問第三十五問若在佛前塔前得禮比丘不比丘互相作禮可得耶答不得有何過咎犯捨墮葢天子殿前郡邑分庭臣佐吏民尚不以擑讓大聖像前烏可得乎故犯此罪今之比丘犯此者不勝其多宜自謹之慎毋輕信而自招罪戾也或彼此對佛作禮猶可直受人禮者斷不可也更有今之梵剎供養護法於前僧眾反背佛禮者更為不可亦犯此罪古之梵剎元無護法而立之說皆在左右以表慈威今之所作有違佛制不可不知然而必不能改者禮時應當方便迴護庶幾可也售像何罪問第三十六問若比丘賣佛像有何罪答同賣父母佛言不信何言可信今之比丘亦或有之罪同五逆安可為乎古云是可忍也孰不可忍也梵網經中應當教化取物贖之今此非但不犢抑且賣之逆罪苦報必不能免戒之戒之或云佛大慈悲賣亦不妨邪見闡提鑒斯可反斷堀營修問第三十七問若比丘自手斷樹堀地作佛塔寺及造形像有福不答尚不免地獄受大罪苦有何福耶何以故以故犯佛戒故自手者揀非倩人律中堀土伐木俱犯罪地獄豈得免乎或有急事必伐者三七日前預當告知可也塔像等事自有工人匠作比丘攝心禪坐是為本分營修綴葺而言犯戒者一傷殘物命經中草繫比丘當以為誡二類同客作有妨正道故有罪而無福也佛事竟下法事品問法事品第三法事者如下文中說法誦經書經等事有十三條問答說恭聽情問第一問若比丘高座說法前人著俗服說者齊莊恭謹聽者怠情因循可與說法不法者軌則之義令人依義入道乃至成佛無不由此理須尊重故問答聽法說者二俱犯眾多即應當學若知法者一諫乃至過三諫不改犯突吉羅問即成惡作罪也此問應作罪抄寫筆悞衍之亦可復過三諫犯墮復過三諫犯決斷以惡性不受人諫故復過三諫至棄以其非沙門故或清眾見其非法一總不諫何如若使不諫經三說戒轉增高座說法定披法服聽者俗服以輕褻故得罪俗服者或白衣直裰之類律中纏頸覆頭反抄衣等尚不許為他說法況俗服乎轉僧者夫說戒之法令人懺雪罪𠍴今既不諫不懺已經二箇半月日久自然僧其罪業亦是從輕至重三箇半月更三半月三三無盡故曰轉僧嗚呼說法聽法俱當於此轉僧之處留心倘有此過幸遇諫而即當懺悔其罪可滅也不然自招殃咎亦不可不慎師真弟混問第二問為說法者如法如比丘為人說法威嚴整肅依教宣𫾻乃至不希所有故餘聽者不如法縱逸散心浮靡放曠但益於聞不修實行故得與說法不答同上如前所明可知此為輕法慢教者戒法座佛葢問第三問若比丘請人說法先高座上有帳幔寶葢等是供養佛物得與下坐說法不答都不知是佛物不犯知不得雖云說法理須莊嚴互用佛物有過不得縱或不重必犯二三既知佛有各當迴避不然二俱有過慎之僧先佛後問第四問若有僧坐先寄佛在上後可於上坐說法不答先佛坐得先是僧坐不得此言法師上座說法必當先請佛上理正以為代佛揚化故不然失於尊卑次序亦失代化之意故云先僧不得要知說法必有法堂纔得如法如昔佛對佛猶尚不可況其他乎讀說受施問第五問若人請比丘讀經及說法施主施物比丘得受不答比丘若有一念希望之心不作利人想受者犯捨墮有貪慢罪故若無貪心受不犯若無衣鉢受不犯看經講演弘法利生僧家本分越施敬理亦當然若起希望不同交易便同客作故得罪縱無衣鉢無貪可受法座几塵問第六問若比丘僧中說法於高座上得備几提塵毛尾不答病得備几提塵毛尾犯墮非毛得几案屬小桌之類乃承足之物也法華經云踞師子床寶几承足又薩婆多論云苾芻有時講誦踞師子座几案承足此處言足有病者得備几塵毛不得塵即塵王尾也鹿王出在華國鄤縣宜君山古今以此作拂而用此乃傷生之物故得罪或避蚊蚊繩等類但用木棕等物無犯故云非毛得上座說法或執青松如意等得悋法不傳問第七問若比丘祕經及戒律有事不答犯捨墮經律者成佛之妙道出世之指南應當流布莫大之功而反秘悋怠惰不傳故得此罪半偈捨身斷臂求法盡只為此故不可悋俗裳說法問第八問若為師者具著俗服向眾中說法弟子著法服得與作禮不答有病得不病俗服不得為人說法上文聽者不如法亦且得罪況說者乎病不拘禮從權則可除此不得同上不如法罪可見有㡌說法問第九問若在家白衣頭上有帽比丘得為說法不答除有病必須覆頭得餘悉不得此禮非但而域如是東土亦然即如今之世人尊禮必假衣冠為是𢍉禮則不然例此可知西域有此軌式律中不得與覆頭等人說法除病應應當學故今之說法者但依尊禮為是不拘可知口吹經法問第十問若或經上有塵土草穢得以口吹去不答不得以口穢氣熏經褻慢不恭得罪當以淨巾拭之乃至佛像經桑等俱不得口吹統記云點香點紙俱不得向油燭上點化油氣所熏亦得罪此紙錢等皆墮破錢山其過不小又法苑云上香供佛如不泯口口氣熏香作但無福當來墮於黑糞地獄佛之誠言敢不信乎悲夫今之僧俗學佛道者盡不知此罪過之深草匇忽略無不皆然今吾為人心切故特書此以誠當宜謹肅幸矣為利書經問第十一問若比丘得書經取物不答不得取犯捨墮若自書與人書流通慧命福德無窮佛恩可報若取物者是貪慢心故犯此罪其過非小戒之慎之慢法不尊問第十二問若經上有遺落飯食犯何事答有慢意故為犯決斷慢凟不尊故不慢意犯墮猶失敬謹故當知比丘僧等若書誦經典之時臨齋之際必須別席若無別席必須先請法寶於尊重淨處猶當問訊法寶即是佛之全身舍利成佛之本固宜尊敬如或不然得罪可知焚燒戒律問第十三問若比丘有戒律不用流落不全不堪受持可燒否答不得不知有罪燒犯捨墮若知燒有罪故燒犯決斷與方便破僧同與調達破和合僧無異故亦如燒父母戒律乃法身父母故葢夫流落而燒俗見之常也經典既爾佛像猶然如無用者安置塔中供養若能補復持功德之甚雖他處有開無如依佛所說為勝法事竟下結界品結界法品第四結制也界限也畔也凡有冬夏安居坐禪處所宜應制立界限以定規繩謹束身心勿令放逸失其九旬德業又結界以攝衣令無離宿罪也律中界有三種一者大界二者戒場三者小界以佛聽許疲極僧眾隨處結界盡應集不得受欲是中舊住比丘應唱大界四方相若有山樹林池城塹村舍隨有稱之餘儀皆準隨機羯磨說比丘告云大德僧聽我舊住比丘為僧唱方大界相從東南角某處標至西南角某處標從此至西北角某處標乃至還于東西角某處標此是大界外相一週訖必有屈曲或方或圓等隨事稱之並須別指分齊尺寸處所或洒淨水或以刀畫地乃至于撒砂結繩等皆持大悲神呪二十一遍而用以為制限猶妙由不知制限結既不成羯磨受戒等事俱成虗設故須如上分明唱相三遍則已乃至羯磨問答等事盡詳羯磨本中可知下且隨文釋義有二十二條作二十一問答中有缺略一問臨文可見結界遠近問第一問結界為云何宜遠宜近答結界法若山澤無人妨礙之處隨意遠近皆得若在郡城縣邑聚落之中不得遠結亦不得夜結夜結僧眾不知邊畔故結時要須比丘在四角頭立不得使外人入何也外人入則界不成俗外無戒亦生譏謗故未結大界之前先結界場僧家白衣奴子盡著界場上白衣等者或五戒淨人欲令盡知其事故然後視度四方而唱前來大界相云云度如字隨方屈曲而為軌度非測度之謂也下出其可結之處結界時除四處當結何等四處一者聚落二者聚落外俗人田地常作事處三者若有阿練若獨處山澤聚落則有二種若聚落界外不可分別者準僧祇七樹之量通計六間六十三步若無異眾得成羯磨若可分別者準十誦律盡聚落集之蘭若亦有二種若無難者諸部多云一俱盧舍按雜寶藏云五里是也相傳以此為定俱盧舍有云拘屢舍四百弓為一拘屢舍又云皷聲所及之處有遠近少異可知若難事蘭若如善見論云七槃陀之量相去五十八步四人八寸得作羯磨既得羯磨亦得說戒下開前事之方便恐說戒羯磨時有種種事難不得來何也白眾求別結小界眾若聽可律云不同意者未入界聽在界外一處集結小界受戒亦得又言若布薩日於無村曠野中不得來者亦如是自恣亦爾然而難聽彼無五人不得結眾當遣僧與結別界下結名此謂阿練若坐處上三結大界竟下第四受戒場四者受戒場先結律中聽許眾中受戒羯磨等事當結戒場稱四方相須在大界前結故云先結大界文均除所結戒場當知界文文字非文章之文乃紋路之紋言其四圍所結界相際畔為紋所以大界要以受戒場周圍均等而除之令受戒場住於正中不可偏倚於一隅故云均等下總結除是結界以是其事是者不非不爾皆非也雖然如此亦有不定一法或先結大界後結戒場於中受戒反上戒場先結之意大界中戒場何所比例如界公所云云者語辭譬如府州郡邑公所無異也當知界公二字必非指人而說若說是人此法是佛所制豈佛未說法時先有此人使如來倣傚而遵之者乎下又開方便恐無所獲何也然云不知同於取別顯通此路可有僥倖其人云云亦語辭此廣上不得來之所以曰非但難事不得來山澤獨處之間人所不能知不得來者何也故云恐無等云云同於下同上別結小界顯示令知此路而入使其不及來者而亦來之故云僥倖其人人即是不及來者之人亦非連下句另有其人若另有其人即同上來界公之謬也當細詳之理長則就上明不知不來下明病者難至故設問云若有病比丘不能得往不得到此羯磨受戒又何如曰亦就僧中求索別一屋中結小界僧亦應聽未結之時先解大界與結別界訖然後復來結大界何以解為要出界故解界結界有羯磨文可知下開一切比丘不持衣夜中得入中此或廣接十方往來者未必皆持衣故許入也下文缺一問辭上來無界應結界受戒今往曾結過原有舊界又何如故問若有一住處有界又祗有一比丘無眾不及結界亦可打楗槌廣說戒否下缺答辭應答得雖爾先須向四方僧懺悔然後說戒懺悔者亦可三語何為三語三語者謂三說三說者三番羯磨懺悔清淨已許廣說戒也懺悔之語應云今僧十五日說戒我某甲清淨佛地通結問第二問結界得通大界中佛地結不答得但不得於中受戒佛地即佛殿也受戒自有戒場大聖尊前不預餘事又亦即佛物故或必無處所先對懺悔借過遮障避之可爾若沙彌先不知法不知有此軌則已受得戒知亦不得然而師僧三師七證若知故違有罪亦應犯墮船行結界問第三問若比丘行船正遇結界之時船上得結界不如僧舟行之次亦恐失其一夏禪坐之功故問答得若有沙彌白衣未入大僧數者驅著岸上然後結界若不驅出或不便上岸當障隔著一處然後結界或隔在前後小艙之處而避之船上界畔眾中有力者以水若砂四面擲所及處以作齊限準薩婆多十誦律縱廣六百步為畔以此觀之必是船行泊岸行止之界畔也結界後比丘夜不持衣不得入中非大界故不得入也噫舟行尚爾結制用心非船散誕遨遊者可不慎乎僧行界壞問第四問若大僧有事盡行唯有沙彌在界為得壞不界由僧結必假僧持僧去必壞耶答不壞下舉況但有一清信士在中界便不壞況沙彌乎若一總盡無一宿界壞若僧盡去不還亦不須解已壞故若去欲還應後來復結例上別結小界同賊害界壞問第五問若有賊來界裡殺比丘界壞不答不壞賊殺比丘於界無涉況有餘比丘在故不壞可知三四結界問第六問若一人三四人行道安居時至不遇菴院或在清信白衣家得結界不答不得不成眾故五人以上得結界律規如此可知通流結界問第七問若欲結界得通流水池水結不答一切停水盡得一切分流水俱不得何以故以不知齊畔故停水如池塘之類有限可結分流如谿㵎等急流散漫難定界限故不得界無楗槌問第八問若結界後不打楗槌界壞不楗槌即鐘磬類答不壞修行之法不在楗槌打楗槌法不過雲集清眾乃至利益苦趣眾生打與不打乎界不礙故不壞官塘通結問第九問若欲結界得通王路結界不上因俗人田地處不得遠結故作此問答得但當結界時須遣人兩頭斷行人俗流不淨故當斷之然後結界但入田路向井取水路等皆不得作界相餘俱盡得作界相然而佛世比丘最為尊重王亦不敢違佛規制非今末世之所行常自知時可也無主結界問第十問若無主人所營之地可得結界不但凡比丘所須皆當乞之離不與取過今既無主無可乞者故問答得無主何以得曰便如單越法北俱盧洲人無我執一切俱無有主既無有主宜結便結故云得水坑界壞問第十一問若先結界後有大水或堀坑長十五步失壞託處或復於中行欲有此三事此界壞不答盡不壞其人云應云盡不壞其界爾人字即界字亦筆悞也云亦助辭若亦指人是佛說法又指誰耶亦如上說下佛自舉況不壞所以假使堀大坑深廣一由旬或四十六十八十里如是深廣界猶不壞況小小坑壞耶大水天生堀坑取用犯戒在人于界㳅礙故俱不壞尼界可宿問第十二問若比丘偶爾有事得比丘尼界裡宿不二部界別以遠嫌疑及犯事故恐比丘偶有因緣不及還於本界故作此問答得律中僧差教授比丘尼不及日沒即還違者犯墮今言得者以戒雖遮緣必開故故云得亦不得失衣但不得入其房內爾此二句應宜借轉倒看為妙入房之禮重故宜自裁之不入不失緣開無過故得共住無衣問第十三問若僧結界竟後來僧共住不持衣有失衣不答不失何以不失當結時已通三世僧故或云結大界時隨結攝衣界故夫失者受而不持曰失三世之中若前若後或有本未受持有何所失故云不失不齊結界問第十四問若僧不盡集結界盡集知界齊畔或有三寶事緣不能齊集可得結界不答若有事緣不反到者囑授於餘比丘云有某事得若無事不齊不得僧盡集可得結界故無事偷安懈怠無愧故所不得結界年限問第十五問若一結界得幾時或當逐年結耶答僧有常在不限年數若施主要增地更結耳不要不必更結有僧不壞故不限數若隨增減方便更結亦得不解再結問第十六問若先僧結界不解而去界相猶存後來僧得於中重唱結界不答得先僧不解一宿便壞既無持法人後僧得結也此釋前疑可知界場多少問第十七問若結大界僧當盡集為知界畔故結界場時要須集一切僧為隨意多少答五人以上得何以故以無大界故眾不集也無犯五人以上小界可宜大則不可得越法咎以上云盡不集不得故界場遙結問第十八問若結界場五人以上亦聽要須至場上亦得遙結耶身不親至但遙作想念而結不答要須至場上乃得結爾不至不得者何也身心不恭故違佛制不能成就故不得也相叉結界問第十九問若二眾結界得互相叉結不如兩手相叉之狀而結不二眾或僧尼二眾或二處菴院比丘自有二部眾答不得相叉得共通結耳彼此相叉混雜難分猶恐犯諍故不得但共通結者雖云二眾事同一體故一界二槌問第二十問界法僧集須打楗槌若一界裏得鳴二楗槌不答得或界廣大故但不得二處說戒及以羯磨種種僧事僧事不過僧中教誡等事宜一處不宜二處以律云此一住處一說戒故惟得燒香飲食而已燒香等事二處三處總不論僧尼共界問第二十一問或有檀越欲供二部僧大僧得與尼二部相隣通結界不答得通結者要一切僧尼盡集而結此名四方大界通亦無過以順施主心故上結界竟下明歲坐事問歲坐事品第五歲者律中七月十六日是比丘五分法身生來之歲歲即生又七月十五日是五分法身臘除之日也今言歲坐之歲正為坐禪臘滿至七月十六日受歲得其五分法身之新生故云歲坐此經上來發明微細威儀微細因果與比丘戒非僧上緣然而欲生定慧應須坐禪故結界已之於歲坐事即下文種種事相宜為宜止有所不決必須問明使無疑慮故有此品二十九問答結坐期限問第一問比丘夏中幾日得結坐應更問幾日得受歲略也結制安居坐禪各結坐形心攝靜曰安要期住此曰居此下四月十六至八月十五四月皆稱夏中者以西域一年三際春夏冬也四月日為一時此當夏分故云夏中答安居有三從四月十六日為前安居盡五月十五日為後安居日日可結問一日結坐足已何用多日多日不定豈不失于前坐耶此謂坐初有事難不得一日來結或延五三四日乃至一月盡不失前坐下與前坐人安名此名三十日結坐一日受歲此因後人來結不免前人同結故有三十日之名受歲一月者因至七月十五日九旬已滿受歲即行故止一日此乃最初一日來者曰前人下明最後一日來者曰後人後坐人惟得一日結坐過了五月十五更不再結故下明後人受歲法過七月十五日有事難日日可受歲盡八月十五日然而受歲止得七月十五一日一日可受者為前坐初事難等人延遲日子所以七月十五九旬未滿不得即受遲來一日待一日直至最後五月十五來者當至八月十五始滿九旬方許受歲出期故下立名曰此名一日結坐三十日受歲此為前人受歲他雖未滿亦在中間同受故云三十日等中間有二十八箇次第相續結之作中安居可知葢夫此之大意要知一處安居四方可聚此是如來深大慈悲怋其事難之人不使失其禪坐之功特此善權方便耳學者當知佛恩難報於斯可見也遇緣告出問第二問比丘結坐有緣皆開欲受七日法為當坐初受為是臨行時受答若坐初受者好坐初不受不曾料理亦可臨行時受下開夫受七日法行不滿七日還或四五六日後行不復更受計滿七日乃復更受若慮忘失者亦可日受此為比丘禪坐之時或遇種種生善滅惡利益等事乃至缺衣鉢等必不得已理須告假而有常規少則七日多則三十九日故下有三受七日等說然而律中亦不得專為飲食告出而去以非法事故受亦不成信之律有受法文云應具威儀對眾白云大德一心念我比丘某甲今受七日法出界外為某事故還來此中安居三說若受半月等法方作白二羯磨縱止一日事皆須七日法恐有小事頻頻告出桂安之名故爾坐禪受物問第三問比丘夏坐中不受床坐房舍十二物得坐不答不須受十二物詳明根本毗尼律中下云三月補治房舍似亦應受三衣六物不可缺故餘臥具等夏熱不受亦可故云不須不坐得歲問第四問比丘夏中愍物行慈故應結坐結坐而不坐得歲不答若先不知有夏坐之法受歲得若知坐法故違不得不知者未曉禪坐工夫知法者或修止觀或看話頭乃至持呪念佛返照回光收攝一心契悟無生外當調和四大等事詳明宗教不可不知如或不然雖云結坐放逸縱情徒有虗名總是虗消信施慎諸不結不坐問第五問比丘都不結不坐受歲得不答若先不知有結夏之事又不知有坐禪之法二俱不知受臘也得有結知便應向僧懺悔先總不知然後一知有結有坐即當懺悔無咎若先知法故違不得受歲知而故違得越法罪懺悔者懺其先不知之過可也知而故犯懺亦猶難懺而犯犯而懺殺子同葬教有明文不可不慎懺悔之說隨事可知不結而坐問第六問不結而坐得歲不答同上事同上知不知等乃坐禪時始到因結時不在亦同故違故曰同上池流澡浴問第七問比丘夏坐中得入流水池水浴不比丘半月一浴熱時不拘故問答界內盡得隨其所宜界外不得若受七日法行過水亦得受法在外不越於事故無所犯決斷不悔問第八問比丘夏中是修道之時或犯決斷不悔未向二十僧中出罪受歲得不答雖有罪得歲所以爾者何也故是比丘故不至犯棄不失比丘事故亦得受歲不和得歲問第九問比丘受歲不和合應來者不來應與欲者不與欲等如是不和得歲不答要先懺悔然後受歲眾僧受歲和合方成中間有一犯諍乃至非法非律等不如法事必使他懺悔清淨眾可受歲若其人不悔有妨於眾故須擯出始得受歲若不擯出眾當對其三諫過三諫乃至四諫不受語者是惡性人犯決斷罪若過四諫以至五諫犯重既耳畢竟何如若僧中有力量者能驅逼他出界好受歲若其驅亦不出當牢閉著一空閑房中然後受歲無苦無罪也何以定要如此以其非復比丘故畢竟不出何如若惡人多眾所不敵且不受諫驅又不出清眾反當避出界他處受歲若共受歲必不得歲何也比丘以和為貴懺悔為先若能一懺無罪不滅若不懺者轉至犯重故不能也例如十人同修淨土一人不淨九人亦不得生故坐中造福問第十問比丘夏坐中得為亡師造福不答得但不得手自造事比丘或和尚闍梨等師歸逝當感其携訓之德須造福而酧報之然而但不得自造一妨禪坐之功二亦類于客作故坐中搖扇問第十一問比丘夏中得捉扇拂不答一切毛不得捉竹扇得毛扇乃鷄翎鳥羽傷殘等物俱不得捉竹扇無傷故得拂者搖也以扇搖動使令有風故當知此是一物非另指拂子為拂也前已明故後坐同起問第十二問夏中後坐人得七月十五日受歲起去不答不得後人必待九旬已滿始得因不滿故不得下開若後坐人先不知滿與不滿已隨前人受者得歲若知法知其未滿不應故違不得又開一端若已有和合僧議通就受籌而已亦得下前後例同若後坐人受歲時和僧受籌得者前坐人亦爾亦有和僧受籌似乎不必至滿亦可受歲然而此等或為有事等不得已而開之一二只是坐滿方成功德可知受籌者得歲之約如世間剳付之例也同臘小大問第十三問若二人小大二比丘同坐夏臘小者前坐或四月十五坐大者後坐或遲幾日乃至五月中坐前坐者雖小已受歲日滿即受故後坐者雖大未受歲因遲幾日待月滿始受故於一月之中何者應大答先大故大大即上大者之大元指戒大為大何以故計本日故本日即指最初受戒之本日不說夏中受歲之本日要知小大者言戒之前後非生年之大小故雖坐臘受歲在一月之中已受未受而分前後受戒之本日還是大者為大故云先大等也喻如朝廷序爵鄉黨序齒之謂也若只論受歲不論戒臘似乎單序爵而不序齒豈理也哉何也戒臘乃僧家尊𢍉次序之衡如在家之生年大小等故不受出界問第十四問比丘夏中不受七日法暫小小出界故得坐歲不答懺悔得欲出受法二利無遺不受而出得越法罪故須懺悔始得夏坐要知律規出必告知于眾或偶失告必須懺悔可也不懺悔罪益深重律中可見三受七日問第十五問比丘夏中一因緣得三受七日不答言得比丘若為三寶看病供養大眾等緣或路遠事難日淺則緣不能成枉勞出入故佛以慈悲方便而開之勿為此言無事閑遊偷安怠惰失大功德甚不可也不坐寄受問第十六問比丘于夏中不來結坐或十人至十五人欲來前坐界中寄託而住共受歲前坐人得共住共受歲不不坐者即十五等人如此間結坐時他或自時言我某大師處受戒坐歲而來不必此間結坐但要寄在于此受歲何如答若及五月十六後坐眾當與他結後坐令他後受歲得若不及後坐不得自恃怠惰與法相違故下開端此人若全不知有結坐法而來者得姑容之共受歲若知有坐法故違強來欲受歲者不得何以故此乃罔尊自大我慢居懹縱容他受亦不得歲故有事移坐問第十七問比丘夏中如法安居而坐或有比丘若為三寶事若疾病種種眾難之事如是所撓不得在此眾中坐得移他處坐不答得移坐以坐定制緣事必開下立法既移有何法則當白眾中受三十九日法受三十九日法已有事便得出界去當擇可移之處到彼處坐守三十九日法上受法此坐法令他如法而坐應上諸緣故重此句不然此句宜衍下開端若坐三十九日滿得還於本處受歲亦好一若不得一者萬一之辭萬一彼處緣事未終受歲又近不得還者亦可於彼處受歲無犯下明前移坐受法此處當設問云受法還應坐初臨行耶答若坐初受更好若坐初不受臨行時亦得受下明後不必受若在所移之處坐已滿三十九日者事便出界事者彼處更有事徑行彼處不須復受三十九日法既有事若不還本處在何處受歲亦得於彼所移之處受歲彼處既可坐禪亦必有眾故亦得此廣上一若不得等句此章大意專為有事難者開端無別不結不受問第十八問比丘不結坐或不受七日法越矩遊行已受臘得不夏滿為臘以要為問答不知法已受得臘知法故違而受不得夏夏即臘也七月十五日是僧臘除也十六是比丘五分法身生來之歲以比丘出俗不以俗年為計但數夏臘故爾增輝記云臘者接也新故交接之謂也下開端知而不得畢竟何如若以夏僧一諫取好夏僧即先臘知事僧應當諫云大德欲如法自利當結坐受法不宜違教若違教者即慢佛語慢佛者不善大德當信佛語勿不結坐及不受法也前後有諫言皆倣於此但隨事相而改即得依其所諫即當懺悔聽取結坐受法者善若不依聽亦不取結受等者應二諫三諫過三諫猶更不取犯戾語決斷輕其戒法失其德業故若懺悔還取結受得當取時白眾然後可得取結受等懺先對諫者懺悔白者或諫師領之對大眾懺悔作白云云以此觀之結坐受法之事必不可缺依規結受纔現正受正得思之不受何事問第十九問若比丘夏滿不自恣受歲犯何事夏滿自恣釋𠍴滅罪生福故當受歲承前而問答或一比丘不受歲眾諫使受一諫乃至三諫受好好者善也下出其過若過三諫至四諫不受犯決斷過四諫不受非沙門即同俗人何以故以不肯受如來法故應犯棄罪可知坐禪受歲兩不可免既稱比丘應自勉旃中後結坐問第二十問比丘夏坐新受戒人或最後來當日受戒即此日中後結坐得受歲不大似結坐清晨為正故有此問答也得受歲惟後夜不得似乎初夜猶得後不得者一則日屬來朝二則缺于志誠故云不得此亦為最後來者開端無別忘受可坐問第二十一問比丘夏中坐忘忘其所以不受七日法一出行得坐不答憶即懺悔得然而一坐中不得過二三悔過二三悔不得歲既悔不應再犯再犯不名為悔亦同上文引喻可知故云不得懺悔羯磨依所犯事說即得屋下受歲問第二十二問比丘受歲時若天雨得移至屋不受歲不答得依律受歲應在戒場露地而坐表夏滿之功超出界外故以天雨移亦不妨此臨時之方便也結坐有礙問第二十三問或有比丘既至某方安居處所結坐或有事難阻礙不達得進遙結坐不以路途有阻未及至彼可在路中遙結而作前坐不答不得正可到彼結後坐或後亦不及到若道路有僧住處可坐之處便應就坐住二三日修治房室治法如下所明然後求僧作白二羯磨受三十九日去去應作法受法坐三十九日已滿欲去徑到彼處充後坐受歲無僧又何如若無僧住處五人以上共結界坐亦要受過三十九日法然後坐若欲去受歲留一二人守界然而欲去滿三十九日乃得去受歲則可若後人此三字宜衍若不滿三十九日去充受歲者前去人不知不滿有過不失前坐受歲亦得後人失後人知不滿日有過故違佛語而去即失前坐受歲亦不得故知必須日滿而去可也此為欲求不及者開端無別檀家結坐問第二十四問比丘一人至四人得白衣家結坐不答不得五人以上得五人乃至多人者方可羯磨作法結小界而坐如眾少不如法故亦不得一人結坐問第二十五問比丘一人靜處得結坐不答應云不得上來四人尚且不得況一人乎下開端先有結界不必更結二人以上得一人以不得以字應作亦字何以故無人共受坐故以無伴侶故不得也無界一人二人以上盡不得必須五人可也若欲於靜處結別坐當更請僧共五人以上而結界坐然後得觀此受歲坐禪若不結界必然不可學者思之無忽坐中他施問第二十六問若比丘夏坐中得受請他施及受他寄物或經十日至三月得爾不答作不貪心受不限時節不拘遠近無過若有貪心十日內即應捨以急施衣止開十日故詳明律部可知坐作有為問第二十七問比丘夏坐中界內應作無為等事作有為事得應坐不答福德事得指授餘非福德事不得若有三寶等有益者但得指示令作猶不宜親自營為恐失威儀亦廢禪坐故餘不得者犯客作罪故制夏坐修葺問第二十八問受夏坐人即是比丘云何作為房舍破當補治為為可不之意也謂始坐時補坐訖時補耶承上有為而問答三月中破即治不論時分有主事僧未安居前便應作唱云房舍破當補治僧祇律中有房屋破漏春末月應當治若草覆者還用草補若瓦覆者還用瓦補云云尼來受歲問第二十九問比丘夏滿受歲之時尼來界內求索眾中受歲自恣應與受不答二尼以上得與受尼八敬中應請自恣故得一尼不得下征釋所以爾者何也以尼獨出界犯重故因尼犯重故不得歲上歲坐竟下度人事品度人事品第六度者提携救脫之謂也末世眾生居家苦迫不能出世欲求出家度於生死大海故云度以上結界安居坐禪名為自利既得自利亦當利他故繼之于度人事品有九問答單己度人問第一問比丘一人得度沙彌與其受十戒不答二人得一人不得何也一為和尚一作闍黎教授故和尚親傳戒法闍黎誡軌則不同佛世一亦能故所以眾多更妙單己為師者不可度人遙請問第二問比丘度沙彌得遙請和尚不梵語烏波吒迦于闐國翻為和尚此云力生三乘道力五分法身皆因師力而生即親教師也答不得一度即為本師自既未能且律其時故不得遙請者或遠處另請他師而來代之故不得何也他度即他弟子故或遙空禮請原受本師之名以為作證亦不得虗得其名不及面面相承故此乃濫叨師位故制臘缺度人問第二問比丘未滿五臘度人犯何事其弟子為得戒不答若知非法而度犯捨墮或遇知法者諫而改悔則可過三諫不止犯決斷上答師犯之問下答弟子等問若弟子不知師是非法受時懇切無有餘念亦可得戒若知師是非法而有餘覺餘思疑惑不切者即不得戒十夏滿足方為和尚五臘已滿堪稱闍黎然而有智聽許離師無智猶須盡壽無智者縱滿五年十年尚不得為師度人況未滿者乎故云不得此乃欲速不達故制無法作師問第四問比丘半月半月都不誦戒又不知法不知大小乘經律又不知種種僧事僧事羯磨布薩斷事兩種五德威儀等事而多度人出家或作三師和尚闍黎教授與人授戒有所犯不答此人尚不應食人信施況復度人若比丘不誦戒飲水食飯日日犯盜故云不應等自己昏昏不能使人昭昭故制既受具戒當勤精進如救頭然當隨有智比丘之前學戒始得慎勿懈怠懶惰而忽諸也盜度弟子問第五問若人父母王法不聽不許出家比丘不問主盜將去度不與取者犯何事答犯重因盜故成棄罪下例非但此也若官人走奴投比丘出家為道比丘若知而安止未度亦犯重有主物故未度尚爾何況盜度者乎末世比丘常有此事不細不謹不觀來歷狂肆妄為故應犯重固當戒之與父作師問第六問若兒前出家作比丘父母後出家來投其兒其兒得度不得度出家學道否答得出家學道以理為宗只論佛法不拘世禮既能度人一切悉皆得度故如淨飯禮拜如來摩耶聽佛說法故云得也不然住我我所不可犯戒度人問第七問若有犯戒比丘得度人不答若犯重無復度人之理有犯棄尚不得稱為比丘失其戒故如舟破漏不能得度故云無此理也下開端若犯決斷同上未滿五臘者例上可知若犯餘輕戒波逸提等要須懺悔然後得度既懺清淨始得為人師範少不清淨猶為不可況重者乎故制請他代己問第八問若有白衣投一比丘欲出家比丘即受自或不能為他師範更為請和尚與之作受戒師前來所投比丘故是師非是師耶答非師非和尚不稱本師故下開若後從受法者可為法師或更無法可受若但依隨者可為依止師畢竟不得稱和尚不曾得他戒故混濫稱師者于此可鑒度人不教問第九問若比丘多度弟子出家或作二師和尚闍黎都不教戒犯何事答犯捨墮何以故因怠惰不教情眷屬故下引證昔迦葉佛時有比丘度弟子不教戒多作非法或毀禁戒等以無教誡不能懺悔下明感報命終生龍中龍法受苦法七日一受對時火燒其身肉盡骨在尋後還復則復燒不能堪苦下追觀宿因便自思惟我宿何罪致如此苦耶因苦致疑而責己也龍具五通便觀宿命自見即知本作沙門不持禁戒師亦不教因知師不教戒便作毒念嗔其本師此乃忤逆怨爺娘之類也念欲傷害其師會會亦應作念所以念後偶爾其師與五百人來乘船渡海龍便出水捉舟舟中眾人即問汝是誰龍即答言我是龍眾又問曰汝既是龍何以捉船龍又答言我不須別物汝若下此比丘我即放汝使去不則不然眾又問此比丘何豫汝事都不索餘多人而獨索此比丘者何耶龍曰本是我師是師理應教戒於我不教戒我今受苦痛是故索之此等眾人事不得止便欲捉此比丘著水中比丘曰我自入水不須見捉即便投水喪命此乃為師失教之報也下總結上文以此騐之度人不可不教戒既為人師勿失於教欲善學無善教善即翻成不善失教之過也或不善因教而善此即教化之功也是故律云凡是弟子應勤檢察不然乃至令其不修善品非法自居如無韁之馬為害非細所以佛言汝諸苾芻寧作屠兒為殺害業不與出家授近圓已捨而不問令我正法速時壞滅是故于弟子處極須檢察乃至不順呵教者驅令出院慎毋姑容而彼此有害也噫近世往往見有誡之者諄諄聽之者茫茫是誰之過歟此乃專為度而不教教而不善者為誡深有意焉思夫大悲世尊碎身殞命不能報其洪恩者在上度人事品竟下受戒事品問受戒事品第七既度人出世必須與之受戒因上度不教誡而招大過所以度人後繼之於受戒品受戒者三皈作法白四羯磨此受彼授遞遞相承令人改惡從善反邪歸正回光攝念了悟自心直至于無生法忍之謂也事者如下犯戒捨戒等事有十九問答犯戒不悔問第一問若沙彌犯十戒一不殺二不盜乃至十不捉銀錢等為之十戒犯即干犯毀損之意其中或犯一二三戒不悔受大戒得不答若憶而不悔不得身器不淨不得淨戒故或都不憶若不知法受得戒如前以非法得故下誡其師大受戒法師應問沙彌曰汝不犯戒不沙彌答若言犯即教懺悔始得若本師不問壇上師闍黎教授等應問若一總都不問師犯捨墮慎矣哉為師範者必須嚴密細心審察為上不然未見利人先損於己何益之有哉受大懺小問第二問若比丘以受大戒以即已也得悔沙彌時所犯之戒不答得既不覆藏有益無損故但懺悔法同沙彌時懺悔法或向本師或一比丘即得不必同大比丘懺悔法不懺猶恐大戒不固又不可大抵同上先犯而不憶受大戒復始憶而懺悔者是恐後憶而不悔故出之也衣鉢不全問第三問若沙彌壇上欲受大戒應著袈裟脫履圓頂可也或著俗服非袈裟脚著履屣皮革之屬或衣鉢不具假借當時為得戒不答惟俗服師不問不得恐是破內外道假意受戒故當知師若問過令其改過始得其餘盡得雖爾師僧犯捨墮以慢法故既犯此過非小縱得無益可見畢竟不得明矣故受戒儀云此衣此鉢要須自己製辦若借若無並名非法准律明判並不得戒一生虛消信施將來墜墮三途長劫輪迴無有解脫以此觀之借衣受戒可乎此為師僧不細密者戒不捨重受問第四問若有比丘不捨戒作沙彌或即大道人此人無不曾犯戒或好彼此名聞詐作沙彌欲求增勝而更受戒不答不得仍前戒狂問第五問若更受不得戒前所受戒故在不答在因前受者在所以今受者不得然而即大道人而言在者文中或字宜衍只作一人看可通若作二人看前者犯戒不捨而言在者不可何也律中比丘若犯重者必須捨戒而作沙彌猶尚未許便受大戒況他不捨而得受乎故總言不得經中不說者恐譯家潤文不足未可知也當自詳之後師是非問第六問若先受戒在後師故是師不答非因不得戒不得稱師此為後受忘前者制一人為師問第七問若多人受戒而并請一人為師可得十人五人一時受戒不答無此理律中受具戒具須十師具足一和尚二阿闍黎並須如法七師為證皆請清淨等者若不滿十人戒不成就何以故如戒儀云圓成三聚必假於三師舉檢七非全憑於七證所以必滿十人始得舉人受戒十等一時者僧祗律中但許三人一同受戒四亦不得以非眾為眾而作羯磨與理相違故總云無此理須異時次第受者可也或遇僧眾太多不及次第者或可權開方便多人一時而受者亦得不然當依僧祇一二人為正二師受戒問第八問若沙彌更受大戒具足等戒請一比丘為大戒師而此比丘不知羯磨法及受戒法更與他代請一人與沙彌受戒前者後者以何當為師答後請比丘與受戒者是師前者比丘無戒法與者非師羯磨法者一白三羯磨策發審問等事也然欲為師範者應當深明三觀精練二持五德十數說行兩遂者可也不然己事不明欲為人師者非也師不如法問第九問若受戒時壇上師僧三師七證或著俗服不搭袈裟或犯禁戒失比丘體受戒者得戒不答若受戒人為弟子者知上師僧俗服等是非法不得以生疑動念故經中有一不清淨者汝戒律儀必不能成就故不知得不知是非師雖有過弟子認真信心致切了無疑念故得信為道元功德母正在于此師師受與弟子無涉故不知受戒問第十問若受戒時眾僧不和合或相打相罵受戒之者為得戒不為必也答若壇上僧和合便得壇僧不和受者不得僧寶貴在六和身和同住口和無爭意和同悅戒和同修見和同解利和同均如是可名為僧今既打罵不和非僧之類也然而眾不和與受戒者無涉只求壇師和合者可也此若不和當俟調適而後受亦得取時受戒問第十一問若欲受戒為有時節不答惟後夜不得以時日難定故若初夜中夜有燈可得無燈燭亦不得彼此不及相覩故要須相覩形色乃得受戒要須師師相授遞遞相承覩師形相如覩聖容能生信樂發歡喜心始得無燈不及至此故不得但在日中為正可知移壇受戒問第十二問若受戒時或值天雨更移戒場屋下受戒得戒不戒場非屋亦表露地求出三界故答若欲移戒場屋下受戒亦得然而當先解大界屋下更結戒場而有所依之託乃得受戒不爾者不得無所依之戒場故不得也不究得戒問第十三問若受戒時或有事難不得究竟是大比丘不答但三羯磨訖便是大比丘或三羯未託未便得戒可知事難同上水火等究竟者三羯磨後更說四隨四依開示等法無別也所以下文廣明同前不究問第十四問沙彌受比丘戒盡十三事後諸戒師和尚不續教戒得戒具不答若師不教誡至十五日說戒專心聽受便得具足例上白四羯磨竟便得具戒故盡十等者戒師壇上但示四重十三僧殘事之二篇重戒後三篇等不續教者或亦有事緣故專心等者說戒時必當具說戒相故薩婆多云白四羯磨竟以得具戒後說四隨四依十三僧殘等者但為知故說所以不受三皈不得五戒不白四羯磨不得具戒受三皈竟已得五戒後說五戒名者欲使前人識戒相故又云三皈竟說一不殺戒而五戒具矣為能持一五亦能持故有以五戒勢分相著故乃至本意誓受五戒故衣不具足問第十五問若欲受戒三衣不具有持衣直或染不染或裁不裁可得當衣不答盡不得有名無實失威儀故下三衣品中自明受戒必須三衣具足缺一不可縱有衣價等俱未得全衣故盡不得如上假借等說非但不得戒將來反要墜墮三途有何益哉但欲受戒者必不可草匇未得其功先招其過寧不慎乎眾不能齊問第十六問若受戒時三七眾僧或有事緣難得限齊幾僧得受大戒耶答除三師外五僧以上得若全為正同前三師七證等說有六亦可此但暫時從權非常法也有云七證表破七逆佛世有七今無出佛身血故云五六亦得詭詐自尊問第十七問若有沙彌曾詐稱為大道人受大比丘禮後得受大戒不答不得禮猶履也進退有度尊𢍉有分以最尊之首禮于最下之足恭敬之至故稱為禮彼既無尊無𢍉虗許不端未得謂得犯大妄語此名偷臘賊住之人佛下許度故云不得彼處依止問第十八問若有沙彌辭師他行或有事難阻礙必欲還而不得還輙於彼處請依止師受大戒得戒不答得戒事難無妨若師如法堪受便受彼此無過故得哄誘沙彌問第十九問若比丘好為人師誘他沙彌將至異眾與受大戒犯何事彼異眾知他比丘所誘者應聽受戒不答若其沙彌之師有非法事或犯根本大戒乃至販賣等不如法事沙彌及將去者無罪及者趂也趂機隨去有益無損比丘無罪若其師無非法事將去者比丘犯重沙彌得越法罪壇上異眾師僧既知不應與之受戒不審所來事端便與受戒者犯捨墮以違佛語故下引證昔有一長老比丘唯有一沙彌瞻視更無餘者有一比丘輙誘將沙彌去此老比丘無人看視不久命終因此制戒不得誘他沙彌去誘他沙彌去犯重上因老而制下因病而制若有一比丘見他沙彌瞻視老病人比丘教使捨去沙彌若去此比丘犯重比丘貪心為己損他壞自好心故上受戒品竟下受施事品受施事品第八受戒品後繼之於受施者受戒比丘堪為人間福田或有檀越所施四事等物比丘或當受不當受種種事相不同亦當問明故有二十七問答受施得分問第一問若比丘受檀越請四事供養飲食衣服臥具醫藥四事所受之物得分施於他人不答得損己利他或施飢渴等功德無窮正本分事顯其不貪理應如是故云得長請分外問第二問比丘安居之次以受四事長時之請或有小小緣事瞻望等緣出行得食外食得服外藥不服即調伏或用湯藥調適四大故答施主聽得以普欲令人修福故若不聽不得違他心願生譏嫌故古云導師有勅戒勗比丘進道嚴身三常不足分外貪求宜應自反貪心誑受問第三問他人若欲施比丘物先問比丘有無孔恩周急岐政先㷀故問有無比丘實自有不應分外更受以貪心欺彼言無他即施物與比丘此比丘犯何事答貪心取犯捨墮以畜餘長物妄語犯墮以有言無故一貪二妄犯罪兩重所墮之苦猶深不淺固當戒之上座偏眾問第四問若眾僧食偏與上座上座得食不上座者三十年四十年大戒稱為上座二十年十年大戒但稱中座下座今之前戒但可處敬有上座名未至實位也答上座貪心犯捨墮出世大事去貪瞋癡以為最急既稱上座當自知之雖或為眾勤勞理當餘供無貪無過貪即得罪如僧護經中上座貪心乃至墮地獄中受駱駝身火燒號呌等苦可不慎哉詐求好食問第五問若比丘不病詐稱有患苦或言風熱等苦妄語也求索好食乳酪等類貪也既得食之犯何事答犯重虗妄貪饕與盜無異欺誑悲田故犯重罪失儀受食問第六問若比丘不著三衣受食犯何事答犯捨墮乞食許着大衣赴齋七衣平常受食五衣又非但受食有持衣者第三袈裟時不離體始名真持律行者不遵佛語唯圖簡便故得此罪請人須唱問第七問檀越適請二人三人須眾唱不答須唱唱者應執事人資次輪流差請毋得越次一切客僧有利養分不唱不明故須唱也僧尼均得問第八問若大比丘羯磨分物時尼來界內應得分不答應得此所分者乃十方現在僧物尼亦是僧數故應得不然吾我分別得慳悋報為住持者不可不知前後均分問第九問若有緇素之人寄物施一處現前僧物至後更有比丘來分時在座應得分不答若打楗槌以通十方僧故應得分不分有過不打楗槌不得何也此物原施一處既非十方不分理當故云不得道行受施問第十問若比丘行道中婦人施物得受不答或親里若相識者得取無過如不相識被人譏謗不得取取即得罪律制不得與非親里婦人乞物故僧受尼施問第十一問若比丘行道中比丘尼施物得受不答施僧得受僧即眾也隨眾受無過非眾不得如無眾獨受亦恐人譏嫌故云不得同上律制云云後用前齊問第十二問若供僧齋米檀越供養一處僧前所供僧已去此齋主得供後來僧人後人得食不答後來僧若打楗槌得食有為眾之心無私取故若不打楗槌食一飽犯棄槌通十方若前若後一應得食不打楗槌此齋原屬十方後人獨食即盜十方僧物故應犯棄後分前觀問第十三問若四月八日嚫物此是生時大會之嚫七月十五本僧已去本僧即大會時受嚫之僧寺主取與大會後來僧後來僧分取者犯何事答打楗槌現在僧共分無罪若不打楗槌後僧不得取分分者犯盜大會嚫物屬十方僧不打楗槌私剋十方故同前犯棄或不至五錢應計輕重可知後受前嚫問十四問若白衣有貫嚫物貫即施也莫作借貸看文不順故先欲施與本道人道人已去復施與後人後人得受不答應取然而還要問主人即問此白衣人或知事等人本道人必當來不主人答言永不來後人即當呪願取之無罪若言或來即不得取如取犯捨墮因或來或不來故祇犯捨墮若知必來而故取犯棄何以犯棄是四方僧物故犯棄必此細審者但恐因果不清有妨於道出世之業不成就故治生轉施問第十五問苦行比丘治生得物將此物另施與他比丘衣食他比丘可得受不答他比丘若取衣犯捨墮以貪慢心受不淨物故若或窮厄必無有食處彼治生比丘以所得物使白衣作食他比丘可食然而治生道人若白眾言此物非我物是使人物若爾可食若治生主不白眾彼比丘食者犯墮無眾云何二三人亦可白二三亦可稱眾故又若治生道人以物隨施于他人他人言是我物可食物屬他人非不淨故必要如此多種屈曲而作法者要知道人必無治生之理治生者或資生販賣貪利營求其過極重所以寧作屠兒不為販賣詳如律中此是不淨活命之物清淨比丘食之得罪況其治生者乎要使此人自生愧耻不敢再為不淨等事比丘必應以乞食等事而為正命故特以此為戒出物可得問第十六問若比丘得出物不答不得得者犯捨墮既在受施品中此出字據愚意必非出分之出若作出放之出亦可文中但失受意却似他人囊中流出之物未曾有意施人若比丘得者有貪慢心故犯捨墮如或出分而去者令他捨箇何物故上問得不下答不得明者詳之受請多貪問第十七問比丘長受施主百日請中間得受他一食二食不一飡兩飡之說答施主聽得施主不聽不得施主恐其更受他請減少自己之功所以不聽違前施者之勝心故不得輕賤施物問第十八問若比丘食時或含一口飲吐之或取一摶飯棄之犯事不答犯捨墮以食不存五觀故若有所餘之食或持呪加持志心施于淨處令鬼神受享或鳥雀等食之有功無過若含吐棄之即是作賤檀那信施滴水難消故得此罪長食施人問第十九問若比丘乞食餘長得與人不答先乞時無貪心取有長得施眾生乞食有餘當作四分一與同行者一與窮乞人一分施鬼畜一分自食然而無貪心偶爾有餘則可若貪心多取則不可若無眾生舉著樹頭上有眾生噉好若更無明日還得自取受水洗過而取食不得棄以信施重故棄之得罪比丘不授不得何得自取所以還得自取者以更無主故如單越取食法北洲衣食隨處自生人皆隨取而用都無主執故然而律中不受宿食者惜戀命故恐有病故此處還取等者惜信施故隨機方便無一定故可知得受長請問第二十問若主人慇懃欲常供僧比丘得長受他請不答有三可受無則不宜何等為三若其主人之處得行道又無難事又無短乏有此三益得往受其長請不者不可雖得其食無得道益故主請人代問第二十一問若主人請食比丘或有別緣得遣人代不答主人意無在不拘得若主人嫌代去犯捨墮決意請此不請彼故反令譏嫌退息故得此罪比丘鬼食問第二十二問若遇鬼子母食比丘可食不答呪願然後可食非但此也但有香火神祇等食悉當呪願可食呪則隨意可持願者願鬼子神等速超淨土施食檀那增其福慧比或偶遇必無食處則可不然不可施生食直問第二十三問若有主人欲供比丘或無財物而施比丘牛馬奴供食直比丘得取不答取用以愍物故但可自家使用不得賣賣則有傷故不得若施弓刀一切器仗皆不得受此乃傷殘物命之器受之有損無益又有所忌故不得受慎之齋竟餘後問第二十四問若有人自出物供眾僧齋齋竟此僧已去餘物後有僧來得食不答打楗槌得食無過不打犯盜此同上十二齋米中說共盤受食問第二十五問若二比丘共於一盤食各有一半食已分盡過食他分犯何事答若問共食者彼聽食者無罪不聽故意取食犯墮以非理觸他動念故若一總不問而食者亦犯墮所以問聽不犯者何也以共仰手故受必當彼此遜讓彼或仰手授此便仰手受無過仰者恭敬之意此為貪食者制也自好犯罪問第二十六問若比丘欲乞前人物此人問好比丘非意謂好者當施不好無施乞物比丘若云是好比丘而得物至犯何事答實好言好犯墮好者實自言有戒德等以貪心自讚故得此罪不好言好與大妄語罪同犯棄為物犯戒失比丘行故得此罪慎矣哉施物還取問第二十七問若比丘一切餘長之物施人但濟其一時短乏施後隨言我後欲用汝須還我自此而取得爾不答得雖爾要與可信者好不可信者有失約故然後更語一人言我物施某比丘若取還語不得輙取比丘語言不實取則得罪亦應捨墮也上受施品竟下明疾病事品疾病事品第九疾患也病苦也古云病從業感業從妄生心既無妄病從何得然而五陰四大而成色身未免生老病死故有疾病也事者即下文自病看病等種種事相有九種問答病中離鉢問第一問若比丘或有寒熱等病得離鉢食不答重病得以坐起不能故小病猶能坐食故不得嗚呼不病猶尚不得況無病者乎准下文亦犯墮學者當自慎之病不持衣問第二問若比丘疾病三衣不持犯何律衣乃沙門之儀表固不可缺故問答大困無所識知得不持無過有覺知不得惜哉病但有覺不得不持況無病乎今之強徤比丘自棄自暴自倚單修而忽于衣鉢者故違佛教豈不得罪乎持戒比丘必以此語刻骨銘心始得看病為人問第三問若看病之人不語病者私用錢與他病人作食湯藥者犯何事答若用五錢與他犯棄雖有好心為人私取故得此罪下開端若後語病者知之病者歡喜不犯若病人嗔恚不喜者應償不償亦犯棄嗔恚心生便同盜論故得此罪當知一切因果罪福只在一念之間毫釐有差天地懸隔豈得忽乎長物與餘問第四問為看病故主人每日供一百錢日用五十便足餘長者得與餘病者作食不答病者自與便得病者不與或私取與者罪應同上但私用餘長問辭略異可知與病作食問第五問或有病比丘無人看或有好心比丘得與病者作食不答山野無人遠曠之處日中不得往還者應受七日法得與作七日前來總制比丘不得自作飲食今為看病福田最勝故開之先淨薪米受取得作薪米不淨恐傷虫蟻故又云在眾中作淨羯磨而受取作亦得曇無德部受日法云時有佛僧塔事及父母檀越召請受戒懺悔等緣并瞻病求藥問疑請法如是諸事不知云何佛言不及即日還聽受七日去不及七日還聽受十五日去不及十五日還聽受一月及一月日應還要須眾僧和合白二羯磨方得出界事訖還來安居至期滿受歲用酒下藥問第六問若有病人須用酒一升二升下藥可與不答若醫師言用之必瘥得和藥服亦不得空服空服破戒故不得亦應犯墮酒中過多有三十六乃至無量處家者敗國亡家為僧者迷真失性詳明律中不引病欲服氣問第七問若比丘有病只宜服藥亦得服氣不或癆怯等服氣即搬精運氣等類答不得同外道故外道煉身不識惟心病從業感服氣何為業散病除不勞餘力故病可使呪問第八問若比丘腫病腫癰腫氣腫等得使人唾呪不答得唾口也以口持呪呪水治病仗其威力而瘥病故此是密部所有隨意所求如如意珠非同外道故得賣衣求福問第九問若比丘病困篤或闕闕者減也要減衣鉢施眾作福或賣衣鉢用作福德不同故離犯何事答若分外更得弊故舊衣即受持得不犯無有舊衣受持犯捨墮因保病而違佛教故所以衣鉢乃資身之急務入道之正緣如車之兩輪如鳥之二羽寧捨身命勿離衣鉢於此可見上疾病事品竟下死亡事品死亡事品第十死亡乃終盡之謂也蓋夫病痊則生病殞則死死則未免有所遺之物必當因果分明羯磨散眾眾當與之呪願令亡者滅罪生福乃至超昇淨土故疾病品後繼之於死亡事品有十四問答越規分物問第一問若亡比丘物是四方僧物應打楗槌羯磨分若都不打楗槌不通於眾不羯磨不依規作法而分者犯何事答界裏一人以上乃至二三人盡得打楗槌羯磨得分無犯夫楗槌之法警策後人令其作無常想非謂令人而有所得所以下文不打不羯一總犯重若不羯磨而打楗槌亦不得或不打楗槌亦不羯磨而分者盡犯棄下徵釋上文所以爾者何也亡比丘物盡屬四方僧故所以不得輙分軌者專擅之意不作法私專於己即是盜僧物故上明界內下明界外若界外五人以上得羯磨分不打楗槌亦得何以故以無界故然而亡物廣多亦應送至有眾界中作法而分更妙四人以下一總不得羯磨分以非五人僧故若分犯棄既爾此物畢竟何如當齎詣于若遠若近有法僧中作法分之可得若自取齎去至異眾或外道人情之處非清淨僧中初入界不犯出則犯棄既入異眾此物即屬異眾不分而出似盜異眾之物故犯棄如是一處復至餘眾亦入界未犯一出界一犯棄皆同盜現前僧物故所以處處皆然故云一出等下例同若有弟子持師物去亦爾犯與不犯皆同上文打不打等可知師物供僧問第二問若比丘亡此之弟子不持師物與眾打楗槌羯磨分輙自分處供養眾僧既違規制僧可得食不答其弟子先知有楗槌等法者弟子有罪亦應捨墮不知無罪僧不打槌不羯磨而食眾亦犯捨墮奈何今之為弟子者若見師亡便謂我師之物是我所有如父家業必屬於子誰敢得之不達佛法與世法不同那管犯罪不犯罪縱有地獄且顧眼下故也此等非但世諦俗僧學道禪和不通佛教者亦或有之哀哉惜哉求道者當通教相明信因果不然雖云學道反入泥犁無所禱也師物應得問第三問若師亡眾僧羯磨分亡師之物亡者弟子應得分不答應得何也即是現前僧故嗚呼弟子隨眾祇分一分者可見佛法平等以至如此末世果有如是弟子即可謂之真修行人戒定慧品必得增明無上菩提庶可希冀矣不然瞞頇儱侗因果不明欲求聖道秪恐未望見在信夫無眾分物問第四問若師亡更無餘僧無僧在界唯有弟子或五戒十戒未得具戒得羯磨分此亡師物不答雖是五戒十戒名字比丘即是現前僧故得分但可打楗槌羯磨分之即得不打楗槌不羯磨分不得亦與盜僧物同故不得也病物無常問第五問若病者無常故也死生不定故曰無常前所供病所餘之物後人或看病者得與餘病者不僧及非僧與之調理湯藥不答此是四方僧物不得輙取與人直五錢犯棄縱減五錢計直輕重一總都應打楗槌羯磨分者始得無過因亡哭泣問第六問若有師徒父母兄弟死比丘因之而得哭不哭泣皆悲哀之意大聲曰哭細聲曰泣答不得僧不同俗故此乃世禮之所為非道人之所事故一舉聲犯捨墮可小小泣涕而已中泣者雖在出世道中亦不越世諦之法同生一會不忍頓離如盂蘭盆經中目連悲哀涕泣等可知又明教嵩禪師輔教篇中有父母師僧臨喪之際不得用縗經等服當以僧服大亦可也必以心喪三年修清淨法以資冥福春秋追慕必以營齋誦經乃至事事法法皆當異於世俗此乃謂之大孝也略取其意文繁不引不在分物問第七問或比丘死時在羯磨時不在或死時不在羯磨時在二種在與不在各應得分物不承上分物中來答及羯磨盡得此是現在十方僧物故死時在羯磨時不在不得死時雖住屬過去羯磨不在屬未來俱非現在故不得然准僧祇律中有或值死不值羯磨乃至若為病人求醫藥若為塔事僧事云應與是名無常物法也復有不應分物其中或有經律等應分處與能讀誦者不應分賣分賣得罪慎之厚葬不宜問第八問若比丘死後人弟子輩與他買棺木周尸曰棺衣服之類葬埋之與者犯何事答曰白僧但與泥洹僧下著裙僧祇支此云覆膊掩腋衣即今褊衫之類與其之自覆自餘所多者一切皆應入僧不得買棺等買即有過何以故師物一切不得埋故埋有何罪埋過五錢犯棄即是盜用四方僧物故若弟子私物得感師之德隨用多少無過設使亡者存日知法已得分處分者無罪隨其在日之本心欲用者用欲散者散乃至欲存者存後人依其遺命而行者無罪不然皆屬四方僧物故不得也僧與俗葬問第九問若父母諸親死無有所葬之物比丘與辦衣衾棺木埋之得不答不得以俗難消信施故上明死事下明在事若父母亡日亡應作存或作無亦可無物之日若病無人供養比丘乞食應與之半如黃梅有養母堂故若父母自能繩線料理得來不得與之與食犯捨墮與衣亦犯捨墮比丘所有俱屬檀那信施俗不可用故俱得罪況復棺木葬埋耶其罪更重可知病物供僧問第十問若病者無常故也所有衣鉢存日先與看病者去竟不羯磨亦不打槌看病者賣為飯僧與他作福眾可得食不答眾未得羯磨食眾犯捨墮眾若羯磨而後食者無犯若看病者不知佛法中已作羯磨得食若未作因不知故眾當語法眾既知事應教他作羯磨法然後可食知法者不教亦得不教悔過罪也借物自取問第十一問若比丘借他人之物暫用而後還前人債上已死或無人來取借物比丘得還自取用不答公私多少一切所借之物不得自取他雖不來取犯突吉羅既不取應捨於大眾之中白眾眾還得取眾不還眾犯突吉羅若眾不與或不應與故強取取物比丘犯捨墮此是僧物不應取故捨者善不捨者當墮泥犁貪饕違制故得此罪也有云比丘借物與人等說文字不順故不取也為師起塔問第十二問若比丘得為亡師起塔欲報師長訓誨之恩可得不塔者准十二因緣經塔有八種佛塔八重菩薩七辟支六四果五三果四二果三初果二輪王一凡僧但蕉葉火珠而已今亡師塔蕉葉火珠者是此與上塔義略異答自物得用與師起塔師物作者不得以是十方僧物故作者同上犯師物埋葬之罪可知得禮師塚問第十三問若比丘得向師塚本師和尚之塔禮不答得禮感師恩德故下文佛預設難問以為或者之辭或有難曰生是我師以法益人當禮可也已死尚非比丘唯枯骨而已何由向禮禮之何益耶禮者應例答云若佛在世應供養恭敬說法利生故泥洹後亦是枯骨何以供養耶殊不知師生以法益人死後感其生前法乳之恩亦應恭敬禮拜埋之必然有何過也亦如佛恩罔報理應敬禮所謂投身不足報洪恩殞命不能報深澤佛恩既爾師恩例然可知也後僧分物問第十四問若分物之時羯磨已訖羯後更有僧來得分眾物與之不答若羯磨訖雖云現前不與無咎意含未訖亦當與之若及後羯磨猶故得分後或更有遺忘之物謂之索欲羯磨故有此說此乃世尊深慈細密一得利於均沾二者功乎無失彼此因果纖悉無差非大聖大智慧者孰能於此哉上死亡事品竟下卷三衣事品
